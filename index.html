<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Genshin PDA · Mario</title>
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
            margin: 0;
            padding: 0;
        }

        .device-prompt {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: #fff;
            font-family: 'Courier New', monospace;
            gap: 30px;
            padding: 20px;
        }
        .device-prompt.active {
            display: flex;
        }
        .device-prompt h2 {
            font-size: clamp(28px, 5vw, 48px);
            color: #ffd866;
            text-shadow: 0 0 20px rgba(255, 216, 102, 0.3);
            text-align: center;
        }
        .device-prompt .btn-group {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .device-prompt .btn-group button {
            background: #3a3a6a;
            border: 2px solid #6a6aaa;
            border-radius: 60px;
            padding: 20px 50px;
            font-size: clamp(24px, 4vw, 40px);
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 0 #1a1a3a;
            font-family: inherit;
            min-width: 180px;
            touch-action: manipulation;
        }
        .device-prompt .btn-group button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #1a1a3a;
        }
        .device-prompt .btn-group button.pc {
            background: #2a4a7a;
            border-color: #4a8aff;
        }
        .device-prompt .btn-group button.phone {
            background: #7a4a6a;
            border-color: #ff6a9a;
        }
        .device-prompt .sub {
            font-size: 14px;
            color: #99a;
            margin-top: 10px;
            text-align: center;
        }

        .pda {
            background: #2d2d44;
            border-radius: 30px 30px 25px 25px;
            padding: 14px 14px 24px 14px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 -4px 8px rgba(0, 0, 0, 0.6), inset 0 4px 8px rgba(255, 255, 255, 0.08);
            border: 2px solid #4a4a6a;
            width: 880px;
            max-width: 98vw;
            max-height: 98dvh;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .pwa-install-banner {
            background: linear-gradient(135deg, #4a2a6a, #2a4a6a);
            color: #fff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: clamp(10px, 1.2vw, 13px);
            display: none;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #6a4a8a;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .pwa-install-banner.show {
            display: flex;
        }

        .pda-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px 8px 4px;
            color: #8af0c0;
            font-size: clamp(11px, 1.6vw, 16px);
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(138, 240, 192, 0.3);
            flex-shrink: 0;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pda-top .top-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .pda-top .led {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4f4;
            box-shadow: 0 0 12px #4f4;
            margin-right: 6px;
        }
        .pda-top .top-stat {
            display: flex;
            align-items: center;
            gap: 3px;
            background: #1a1a30;
            padding: 2px 8px;
            border-radius: 12px;
            border: 1px solid #3a3a5a;
        }
        .pda-top .top-stat span {
            color: #ffd866;
        }
        .pda-top .top-btn {
            background: #3a3a5a;
            border: none;
            border-radius: 12px;
            color: #ccd;
            font-weight: bold;
            padding: 4px 10px;
            box-shadow: 0 3px 0 #1a1a2e, inset 0 2px 4px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.06s ease;
            font-family: 'Courier New', monospace;
            font-size: clamp(10px, 1.4vw, 14px);
            touch-action: manipulation;
        }
        .pda-top .top-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1a1a2e;
        }
        .pda-top .top-btn.shop {
            background: #5a4a7a;
            color: #f0e0ff;
            box-shadow: 0 3px 0 #3a2a4a;
        }
        .pda-top .top-btn.restart {
            background: #4a3a5a;
            color: #f0e0ff;
            box-shadow: 0 3px 0 #2a1a3a;
        }
        .pda-top .top-btn.fullscreen {
            background: #2a4a6a;
            color: #f0e0ff;
            box-shadow: 0 3px 0 #1a2a4a;
            font-size: clamp(14px, 1.8vw, 18px);
        }
        .pda-top .top-stat#buffDisplay {
            font-size: clamp(8px, 1vw, 11px);
        }

        .pda-screen-wrap {
            background: #0d0d1a;
            border-radius: 16px;
            padding: 6px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9), 0 0 0 2px #3a3a5a;
            flex-shrink: 0;
            width: 100%;
            touch-action: none;
            position: relative;
        }
        .pda-screen {
            background: #101020;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            width: 100%;
            aspect-ratio: 800 / 520;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #101020;
            image-rendering: pixelated;
            touch-action: none;
        }

        .pda-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 8px;
            gap: 4px;
            flex-shrink: 0;
            width: 100%;
        }
        .pda-controls-left {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .pda-controls-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }
        .ctrl-btn {
            background: #4a4a6e;
            border: none;
            border-radius: 14px;
            color: #ccd;
            font-weight: bold;
            box-shadow: 0 5px 0 #1a1a2e, inset 0 2px 4px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.06s ease;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-touch-callout: none;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a1a2e;
        }
        .ctrl-btn.arrow {
            width: clamp(60px, 12vw, 90px);
            height: clamp(60px, 12vw, 90px);
            font-size: clamp(28px, 5vw, 44px);
            border-radius: 20px;
            touch-action: manipulation;
        }
        .ctrl-btn.jump {
            background: #6a4a8a;
            color: #f0e0ff;
            box-shadow: 0 5px 0 #3a2a5a, inset 0 2px 4px rgba(255, 255, 255, 0.15);
            width: clamp(80px, 16vw, 120px);
            height: clamp(80px, 16vw, 120px);
            font-size: clamp(40px, 7vw, 60px);
            border-radius: 50%;
            touch-action: manipulation;
        }
        .ctrl-btn.jump:active {
            background: #7a5a9a;
            transform: translateY(4px);
            box-shadow: 0 1px 0 #3a2a5a;
        }
        .ctrl-btn.jump.pressed {
            background: #8a6aaa;
            transform: translateY(4px);
            box-shadow: 0 1px 0 #3a2a5a;
        }
        .ctrl-btn.arrow.pressed {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a1a2e;
        }

        .phone-sidebar {
            display: none;
            flex-direction: column;
            align-items: stretch;
            gap: 8px;
            background: rgba(20, 20, 40, 0.6);
            border-radius: 16px;
            padding: 10px 8px;
            min-width: 100px;
            max-width: 130px;
            flex-shrink: 0;
            border: 1px solid #3a3a5a;
        }
        .phone-sidebar .top-stat {
            display: flex;
            align-items: center;
            gap: 4px;
            background: #1a1a30;
            padding: 4px 8px;
            border-radius: 12px;
            border: 1px solid #3a3a5a;
            color: #8af0c0;
            font-size: clamp(12px, 1.8vw, 16px);
            font-weight: bold;
            justify-content: center;
        }
        .phone-sidebar .top-stat span {
            color: #ffd866;
        }
        .phone-sidebar .top-btn {
            background: #3a3a5a;
            border: none;
            border-radius: 12px;
            color: #ccd;
            font-weight: bold;
            padding: 8px 0;
            box-shadow: 0 3px 0 #1a1a2e, inset 0 2px 4px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.06s ease;
            font-family: 'Courier New', monospace;
            font-size: clamp(14px, 2vw, 18px);
            touch-action: manipulation;
            text-align: center;
            width: 100%;
        }
        .phone-sidebar .top-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1a1a2e;
        }
        .phone-sidebar .top-btn.shop {
            background: #5a4a7a;
            color: #f0e0ff;
            box-shadow: 0 3px 0 #3a2a4a;
        }
        .phone-sidebar .top-btn.restart {
            background: #4a3a5a;
            color: #f0e0ff;
            box-shadow: 0 3px 0 #2a1a3a;
        }
        .phone-sidebar .top-btn.fullscreen {
            background: #2a4a6a;
            color: #f0e0ff;
            box-shadow: 0 3px 0 #1a2a4a;
        }

        /* ===== ТЕЛЕФОН: исправлено отображение экрана ===== */
        .pda.phone-mode {
            padding: 6px;
            border-radius: 0;
            border: none;
            box-shadow: none;
            max-width: 100vw;
            max-height: 100vh;
            width: 100vw;
            height: 100vh;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: stretch;
            gap: 6px;
            background: #1a1a2e;
        }
        .pda.phone-mode .pda-top {
            display: none;
        }
        .pda.phone-mode .pda-screen-wrap {
            flex: 1 1 0%;
            min-width: 0;
            min-height: 0;
            padding: 4px;
            border-radius: 12px;
            order: 2;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .pda.phone-mode .pda-screen {
            flex: 1;
            width: 100%;
            height: 100%;
            aspect-ratio: auto;
            border-radius: 8px;
            background: #101020;
            overflow: hidden;
        }
        .pda.phone-mode .pda-screen #gameCanvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            background: #101020;
        }
        .pda.phone-mode .pda-bottom {
            order: 3;
            flex: 0 0 auto;
            width: 100%;
            padding-top: 4px;
            justify-content: center;
            gap: 12px;
        }
        .pda.phone-mode .pda-bottom .pda-controls-left {
            gap: 12px;
        }
        .pda.phone-mode .pda-bottom .pda-controls-right {
            gap: 12px;
        }
        .pda.phone-mode .pda-bottom .ctrl-btn.arrow {
            width: clamp(65px, 14vw, 100px);
            height: clamp(65px, 14vw, 100px);
            font-size: clamp(30px, 5vw, 44px);
        }
        .pda.phone-mode .pda-bottom .ctrl-btn.jump {
            width: clamp(75px, 16vw, 120px);
            height: clamp(75px, 16vw, 120px);
            font-size: clamp(38px, 7vw, 56px);
        }

        .pda.phone-mode .phone-sidebar {
            display: flex !important;
            order: 1;
            min-width: 80px;
            max-width: 100px;
            flex: 0 0 auto;
            height: 100%;
            justify-content: center;
            padding: 12px 6px;
            gap: 8px;
            background: rgba(20, 20, 40, 0.7);
            border-radius: 16px;
            border: 1px solid #3a3a5a;
        }
        .pda.phone-mode .phone-sidebar .top-stat {
            font-size: clamp(10px, 1.4vw, 14px);
            padding: 4px 4px;
        }
        .pda.phone-mode .phone-sidebar .top-btn {
            font-size: clamp(11px, 1.6vw, 15px);
            padding: 6px 0;
        }
        .pda.phone-mode .pwa-install-banner {
            display: none !important;
        }

        /* Магазин */
        .shop-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            touch-action: none;
        }
        .shop-overlay.open {
            display: flex;
        }
        .shop-modal {
            background: #2a2a44;
            border-radius: 32px;
            padding: 20px 24px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            border: 2px solid #5a5a8a;
            color: #ccd;
            touch-action: auto;
        }
        .shop-modal h2 {
            text-align: center;
            color: #ffd866;
            font-size: clamp(22px, 4vw, 28px);
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 216, 102, 0.2);
        }
        .shop-modal .close-btn {
            float: right;
            background: none;
            border: none;
            color: #aac;
            font-size: clamp(24px, 4vw, 30px);
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            padding: 4px 8px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e38;
            padding: 10px 14px;
            border-radius: 16px;
            margin-bottom: 10px;
            border-left: 6px solid #6a4a8a;
            transition: 0.2s;
            gap: 8px;
            flex-wrap: wrap;
        }
        .shop-item .info {
            flex: 1;
            min-width: 80px;
        }
        .shop-item .name {
            font-weight: bold;
            font-size: clamp(14px, 2vw, 18px);
        }
        .shop-item .desc {
            font-size: clamp(10px, 1.2vw, 13px);
            color: #99a;
            margin-top: 2px;
        }
        .shop-item .price {
            font-size: clamp(13px, 1.6vw, 16px);
            color: #ffd866;
            margin-right: 8px;
            white-space: nowrap;
        }
        .shop-item .buy-btn {
            background: #4a6a8a;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: bold;
            padding: 6px 14px;
            cursor: pointer;
            box-shadow: 0 3px 0 #1a2a3a;
            transition: 0.06s ease;
            font-family: inherit;
            font-size: clamp(12px, 1.4vw, 15px);
            min-width: clamp(50px, 10vw, 70px);
            touch-action: manipulation;
        }
        .shop-item .buy-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1a2a3a;
        }
        .shop-item .buy-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 0 3px 0 #1a2a3a;
            cursor: not-allowed;
        }
        .shop-item .bought {
            color: #6f6;
            font-weight: bold;
            font-size: clamp(13px, 1.6vw, 16px);
            white-space: nowrap;
        }
        .shop-currency {
            text-align: right;
            font-size: clamp(14px, 1.8vw, 16px);
            color: #ffd866;
            margin-bottom: 12px;
            padding: 4px 10px;
            background: #1a1a30;
            border-radius: 30px;
            display: inline-block;
        }

        /* Адаптив для телефонов с узким экраном */
        @media (max-width: 700px) and (orientation: portrait) {
            .pda.phone-mode {
                flex-direction: row !important;
                flex-wrap: wrap !important;
                align-items: stretch !important;
                gap: 4px !important;
                padding: 3px !important;
            }
            .pda.phone-mode .phone-sidebar {
                min-width: 60px !important;
                max-width: 70px !important;
                padding: 6px 3px !important;
                gap: 4px !important;
                height: auto !important;
            }
            .pda.phone-mode .phone-sidebar .top-stat {
                font-size: 8px !important;
                padding: 2px 2px !important;
            }
            .pda.phone-mode .phone-sidebar .top-btn {
                font-size: 9px !important;
                padding: 3px 0 !important;
            }
            .pda.phone-mode .pda-bottom .ctrl-btn.arrow {
                width: 48px !important;
                height: 48px !important;
                font-size: 18px !important;
            }
            .pda.phone-mode .pda-bottom .ctrl-btn.jump {
                width: 56px !important;
                height: 56px !important;
                font-size: 26px !important;
            }
            .pda.phone-mode .pda-bottom {
                gap: 6px !important;
            }
            .pda.phone-mode .pda-bottom .pda-controls-left {
                gap: 6px !important;
            }
            .pda.phone-mode .pda-bottom .pda-controls-right {
                gap: 6px !important;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .pda.phone-mode {
                flex-direction: row !important;
                flex-wrap: nowrap !important;
                gap: 4px !important;
                padding: 3px !important;
                align-items: stretch !important;
            }
            .pda.phone-mode .phone-sidebar {
                min-width: 50px !important;
                max-width: 60px !important;
                padding: 4px 2px !important;
                gap: 3px !important;
                height: 100% !important;
            }
            .pda.phone-mode .phone-sidebar .top-stat {
                font-size: 7px !important;
                padding: 1px 2px !important;
            }
            .pda.phone-mode .phone-sidebar .top-btn {
                font-size: 8px !important;
                padding: 2px 0 !important;
            }
            .pda.phone-mode .pda-bottom .ctrl-btn.arrow {
                width: 40px !important;
                height: 40px !important;
                font-size: 14px !important;
            }
            .pda.phone-mode .pda-bottom .ctrl-btn.jump {
                width: 50px !important;
                height: 50px !important;
                font-size: 22px !important;
            }
            .pda.phone-mode .pda-bottom {
                gap: 4px !important;
                padding-top: 2px !important;
            }
            .pda.phone-mode .pda-bottom .pda-controls-left {
                gap: 4px !important;
            }
            .pda.phone-mode .pda-bottom .pda-controls-right {
                gap: 4px !important;
            }
            .pda.phone-mode .pda-screen-wrap {
                padding: 2px !important;
            }
        }
    </style>
</head>
<body>

    <div class="device-prompt" id="devicePrompt">
        <h2>🎮 Выберите устройство</h2>
        <div class="btn-group">
            <button class="pc" data-device="pc">🖥️ Компьютер</button>
            <button class="phone" data-device="phone">📱 Телефон</button>
        </div>
        <div class="sub">Интерфейс подстроится под ваш выбор</div>
    </div>

    <div class="pda" id="pdaContainer">

        <div class="pda-top" id="pdaTop">
            <div class="top-group">
                <span class="led"></span> GENSHIN
            </div>
            <div class="top-group" id="topStatsGroup">
                <div class="top-stat">❤️ <span id="livesDisplay">3</span></div>
                <div class="top-stat">🪙 <span id="coinDisplay">0</span></div>
                <div class="top-stat">🏁 <span id="levelDisplay">1</span>/20</div>
                <div class="top-stat" id="buffDisplay" style="font-size:clamp(8px,1vw,11px);">✨</div>
                <button class="top-btn shop" id="shopBtn">🛒</button>
                <button class="top-btn restart" id="restartBtn">↺</button>
                <button class="top-btn fullscreen" id="fullscreenBtn">⛶</button>
                <div class="pwa-install-banner" id="installBanner"><span class="icon">📲</span><span>Установить</span></div>
            </div>
            <div class="top-group">
                <span class="battery">⚡ <span id="scoreDisplay">0</span> pts</span>
            </div>
        </div>

        <div class="pda-screen-wrap">
            <div class="pda-screen">
                <canvas id="gameCanvas" width="800" height="520"></canvas>
            </div>
        </div>

        <div class="pda-bottom" id="pdaBottom">
            <div class="pda-controls-left">
                <button class="ctrl-btn arrow" data-key="ArrowLeft">◀</button>
                <button class="ctrl-btn arrow" data-key="ArrowRight">▶</button>
            </div>
            <div class="pda-controls-right">
                <button class="ctrl-btn jump" data-key="Space">●</button>
            </div>
        </div>

        <div class="phone-sidebar" id="phoneSidebar">
            <div class="top-stat">❤️ <span id="livesSidebar">3</span></div>
            <div class="top-stat">🪙 <span id="coinSidebar">0</span></div>
            <div class="top-stat">🏁 <span id="levelSidebar">1</span>/20</div>

                if (isMobile && isTouch) return 'phone';
                if (window.innerWidth > 1024 && !isTouch) return 'pc';
                if (window.innerWidth < 800 && isTouch) return 'phone';
                return 'pc';

            function loadLevel(index) {
                jumpKeyDown = false;
                jumpKeyProcessed = false;
                jumpCooldown = 0;
                platforms = [];
                trampolines = [];
                coins = [];
                particles = [];
                goal = null;
                keyItem = null;
                cage = null;
                hasKey = false;
                marioFreed = false;
                requiredCoinsForGoal = 0;

                const data = LEVELS[index];
                if (!data) return;

                for (const g of data.ground) platforms.push({ x: g.x, y: g.y, w: g.w, h: 40, type: 'ground' });
                for (const p of data.platforms) platforms.push({ x: p.x, y: p.y, w: p.w, h: 16, type: 'platform' });
                for (const t of data.trampolines) trampolines.push({ x: t.x, y: t.y, w: t.w, h: t.h, triggered: false,
                    cooldown: 0, bounceForce: TRAMPOLINE_BOOST });

                totalCoinsInLevel = data.coins.length;
                requiredCoinsForGoal = data.requiredCoins !== undefined ? data.requiredCoins : totalCoinsInLevel;
                for (const [cx, cy] of data.coins) coins.push({ x: cx, y: cy, r: 10, collected: false });

                if (data.key) { keyItem = { x: data.key.x, y: data.key.y, w: data.key.w, h: data.key.h,
                        collected: false }; }
                if (data.cage) { cage = { x: data.cage.x, y: data.cage.y, w: data.cage.w, h: data.cage.h,
                        open: false }; }

                goal = { x: data.goal.x, y: data.goal.y, w: data.goal.w, h: data.goal.h, active: false };

                player.x = data.playerStart.x;
                player.y = data.playerStart.y;
                player.vx = 0;
                player.vy = 0;
                player.onGround = false;
                player.jumpCount = 0;
                player.invincible = 0;
                player.facing = 1;
                applyBuffsToPlayer();
                particles = [];

                levelSpan.textContent = (index + 1) + '/' + LEVELS.length;
                if (device === 'phone') document.getElementById('levelSidebar').textContent = (index + 1) + '/' + LEVELS
                    .length;
                updateBuffDisplay();
            }

            function applyBuffsToPlayer() {
                player.maxJumps = activeBuffs.electro ? 2 : 1;
            }

            function updateBuffDisplay() {
                const icons = [];
                if (activeBuffs.pyro) icons.push('🔥');
                if (activeBuffs.electro) icons.push('⚡');
                if (activeBuffs.anemo) icons.push('🌪️');
                if (activeBuffs.cryo) icons.push('❄️' + (cryoShieldUses > 0 ? cryoShieldUses : ''));
                if (activeBuffs.hydro) icons.push('💧');
                buffDisplay.textContent = icons.length ? icons.join('') : '✨';
            }

            const shopItems = [
                { id: 'pyro', name: '🔥 Пиро', price: 50, desc: 'Скорость +20%', effect: () => { if (!activeBuffs
                        .pyro) { activeBuffs.pyro = true;
                        speedMultiplier = 1.2; } } },
                { id: 'electro', name: '⚡ Электро', price: 150, desc: 'Двойной прыжок', effect: () => { if (!activeBuffs
                        .electro) { activeBuffs.electro = true;
                        applyBuffsToPlayer(); } } },
                { id: 'hydro', name: '💧 Гидро', price: 250, desc: 'x2 монет', effect: () => { if (!activeBuffs
                        .hydro) activeBuffs.hydro = true; } },
                { id: 'anemo', name: '🌪️ Анемо', price: 350, desc: 'Прыжок +25%', effect: () => { if (!activeBuffs
                        .anemo) { activeBuffs.anemo = true;
                        jumpForceMultiplier = 1.25; } } },
                { id: 'cryo', name: '❄️ Крио', price: 500, desc: 'Щит (2 раза)', effect: () => { if (!activeBuffs
                        .cryo) { activeBuffs.cryo = true;
                        cryoShield = true;
                        cryoShieldUses = 2; } } }
            ];

            function renderShop() {
                shopCoinDisplay.textContent = coinsCollected;
                let html = '';
                for (const item of shopItems) {
                    const bought = activeBuffs[item.id];
                    const canAfford = coinsCollected >= item.price;
                    const colorMap = { pyro: '#ff6b35', electro: '#ffd54f', anemo: '#81c784', cryo: '#4dd0e1',
                        hydro: '#4fc3f7' };
                    html += `<div class="shop-item" style="border-left-color:${colorMap[item.id]||'#6a4a8a'};">
                        <div class="info"><div class="name">${item.name}</div><div class="desc">${item.desc}</div></div>
                        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                            ${bought ? '<span class="bought">✅ Куплен</span>' : `<span class="price">🪙 ${item.price}</span>`}
                            <button class="buy-btn" data-id="${item.id}" ${bought || !canAfford ? 'disabled' : ''}>${bought ? 'Куплен' : 'Купить'}</button>
                        </div>
                    </div>`;
                }
                shopItemsContainer.innerHTML = html;
                document.querySelectorAll('.buy-btn').forEach(btn => {
                    btn.addEventListener('click', () => { buyItem(btn.dataset.id); });
                    btn.addEventListener('touchstart', (e) => { e.preventDefault();
                        buyItem(btn.dataset.id); }, { passive: false });
                });
            }

            function buyItem(id) {
                const item = shopItems.find(i => i.id === id);
                if (!item || activeBuffs[id]) return;
                if (coinsCollected < item.price) { alert('Недостаточно монет!'); return; }
                coinsCollected -= item.price;
                item.effect();
                updateUI();
                renderShop();
                applyBuffsToPlayer();
                updateBuffDisplay();
            }

            function openShop() { renderShop();
                shopOverlay.classList.add('open'); }

            function closeShop() { shopOverlay.classList.remove('open'); }
            shopBtn.addEventListener('click', openShop);
            shopBtnSide.addEventListener('click', openShop);
            shopCloseBtn.addEventListener('click', closeShop);
            shopOverlay.addEventListener('click', (e) => { if (e.target === shopOverlay) closeShop(); });
            shopBtn.addEventListener('touchstart', (e) => { e.preventDefault();
                openShop(); }, { passive: false });
            shopBtnSide.addEventListener('touchstart', (e) => { e.preventDefault();
                openShop(); }, { passive: false });
            shopCloseBtn.addEventListener('touchstart', (e) => { e.preventDefault();
                closeShop(); }, { passive: false });

            function startGame() { gameState = 'playing';
                loadLevel(0);
                updateUI(); }

            function restartGame() {
                lives = 3;
                score = 0;
                coinsCollected = 0;
                currentLevel = 0;
                gameState = 'playing';
                jumpKeyDown = false;
                jumpKeyProcessed = false;
                keys = {};
                Object.keys(activeBuffs).forEach(k => activeBuffs[k] = false);
                speedMultiplier = 1;
                jumpForceMultiplier = 1;
                cryoShield = false;
                cryoShieldUses = 0;
                loadLevel(currentLevel);
                updateUI();
                updateBuffDisplay();
                closeShop();
            }

            function nextLevel() {
                if (currentLevel + 1 < LEVELS.length) {
                    currentLevel++;
                    loadLevel(currentLevel);
                    gameState = 'playing';
                    updateUI();
                } else {
                    gameState = 'win';
                    if (goal) spawnParticles(goal.x + goal.w / 2, goal.y + goal.h / 2, '#ffd700', 60);
                }
            }

            function rectCollide(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b
                    .y; }

            function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

            function spawnParticles(x, y, color, count = 12) {
                for (let i = 0; i < count; i++) {
                    const a = Math.random() * Math.PI * 2,
                        s = 1 + Math.random() * 4;
                    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1, life: 30 + Math.random() * 30,
                        maxLife: 60, size: 3 + Math.random() * 6, color, gravity: 0.08 });
                }
            }

            function spawnCoinCollect(x, y) {
                for (let i = 0; i < 16; i++) {
                    const a = Math.random() * Math.PI * 2,
                        s = 1.5 + Math.random() * 3.5;
                    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2, life: 20 + Math.random() * 20,
                        maxLife: 40, size: 2 + Math.random() * 5, color: '#ffd700', gravity: 0.05 });
                }
            }

            function update() {
                if (gameState === 'menu') return;
                if (gameState === 'gameover' || gameState === 'win') { updateParticles(); return; }

                frame++;
                if (jumpCooldown > 0) jumpCooldown--;

                let moveX = 0;
                if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1;
                if (keys['ArrowRight'] || keys['KeyD']) moveX = 1;

                if (jumpKeyDown && !jumpKeyProcessed && jumpCooldown === 0) {
                    const canJump = player.onGround || (activeBuffs.electro && player.jumpCount < player.maxJumps);
                    if (canJump) {
                        player.vy = BASE_JUMP_FORCE * jumpForceMultiplier;
                        player.onGround = false;
                        player.jumpCount++;
                        spawnParticles(player.x + player.w / 2, player.y + player.h, '#aaccff', 6);
                        jumpKeyProcessed = true;
                        jumpCooldown = 4;
                    }
                }

                const speed = BASE_PLAYER_SPEED * speedMultiplier;
                player.vx += moveX * 0.8 * speedMultiplier;
                player.vx *= BASE_FRICTION;
                if (Math.abs(player.vx) > speed) player.vx = speed * Math.sign(player.vx);
                if (Math.abs(player.vx) < 0.05) player.vx = 0;

                player.vy += BASE_GRAVITY;
                if (player.vy > BASE_MAX_FALL) player.vy = BASE_MAX_FALL;

                if (Math.abs(player.vx) > 0.5) {
                    player.animTimer++;
                    if (player.animTimer > 6) { player.animTimer = 0;
                        player.animFrame = (player.animFrame + 1) % 4; }
                    player.facing = Math.sign(player.vx) || player.facing;
                } else { player.animFrame = 0;
                    player.animTimer = 0; }

                player.x += player.vx;
                if (player.x < 0) player.x = 0;
                if (player.x + player.w > W) player.x = W - player.w;
                player.y += player.vy;
                player.onGround = false;

                for (const p of platforms) {
                    if (rectCollide(player, p)) {
                        if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 2) {
                            player.y = p.y - player.h;
                            player.vy = 0;
                            player.onGround = true;
                            player.jumpCount = 0;
                        } else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 2) {
                            player.y = p.y + p.h;
                            player.vy = 0;
                        } else {
                            if (player.vx > 0 && player.x + player.w - player.vx <= p.x + 2) {
                                player.x = p.x - player.w;
                                player.vx = 0;
                            } else if (player.vx < 0 && player.x - player.vx >= p.x + p.w - 2) {
                                player.x = p.x + p.w;
                                player.vx = 0;
                            }
                        }
                    }
                }

                for (const t of trampolines) {
                    if (t.cooldown > 0) t.cooldown--;
                    if (rectCollide(player, t) && player.vy > 0 && t.cooldown === 0 && !t.triggered) {
                        player.vy = t.bounceForce * jumpForceMultiplier;
                        player.onGround = false;
                        t.triggered = true;
                        t.cooldown = 20;
                        spawnParticles(t.x + t.w / 2, t.y, '#66ffaa', 16);
                    }
                    if (t.triggered && t.cooldown > 0) t.triggered = false;
                }

                if (keyItem && !keyItem.collected) {
                    const kr = { x: keyItem.x, y: keyItem.y, w: keyItem.w, h: keyItem.h };
                    if (rectCollide(player, kr)) {
                        keyItem.collected = true;
                        hasKey = true;
                        spawnParticles(keyItem.x + keyItem.w / 2, keyItem.y + keyItem.h / 2, '#ffd700', 30);
                    }
                }

                if (cage && !cage.open && hasKey) {
                    const cr = { x: cage.x, y: cage.y, w: cage.w, h: cage.h };
                    if (rectCollide(player, cr)) {
                        cage.open = true;
                        marioFreed = true;
                        spawnParticles(cage.x + cage.w / 2, cage.y + cage.h / 2, '#ff6b6b', 50);
                        spawnParticles(cage.x + cage.w / 2, cage.y + cage.h / 2, '#ffd700', 50);
                        score += 1000;
                        updateUI();
                    }
                }

                let collectedCount = 0;
                for (const coin of coins) {
                    if (coin.collected) continue;
                    const d = dist(player.x + player.w / 2, player.y + player.h / 2, coin.x, coin.y);
                    if (d < coin.r + 16) {
                        coin.collected = true;
                        const mult = activeBuffs.hydro ? 2 : 1;
                        coinsCollected += mult;
                        score += 25 * mult;
                        spawnCoinCollect(coin.x, coin.y);
                        updateUI();
                    }
                    if (coin.collected) collectedCount++;
                }

                let canActivateGoal = collectedCount >= requiredCoinsForGoal;
                if (cage) canActivateGoal = canActivateGoal && cage.open;

                if (goal && !goal.active && canActivateGoal) {
                    goal.active = true;
                    spawnParticles(goal.x + goal.w / 2, goal.y + goal.h / 2, '#ffd700', 30);
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => {
                            spawnParticles(goal.x + goal.w / 2 + (Math.random() - 0.5) * 40,
                                goal.y + goal.h / 2 + (Math.random() - 0.5) * 40,
                                ['#ffd700', '#ff6b6b', '#4fc3f7'][i % 3], 10);
                        }, i * 150);
                    }
                }

                if (goal && goal.active && rectCollide(player, goal)) {
                    goal.active = false;
                    nextLevel();
                }

                if (player.y > H + 50) {
                    if (cryoShield && cryoShieldUses > 0) {
                        let nearest = null,
                            minDist = Infinity;
                        for (const p of platforms) {
                            if (p.y < 500) {
                                const d = Math.abs(player.x - (p.x + p.w / 2));
                                if (d < minDist) { minDist = d;
                                    nearest = p; }
                            }
                        }
                        if (nearest) {
                            player.x = nearest.x + (nearest.w - player.w) / 2;
                            player.y = nearest.y - player.h - 2;
                            player.vy = 0;
                            player.vx = 0;
                            spawnParticles(player.x + player.w / 2, player.y + player.h, '#4dd0e1', 20);
                            player.onGround = true;
                            player.jumpCount = 0;
                            cryoShieldUses--;
                            updateBuffDisplay();
                        } else {
                            lives--;
                            updateUI();
                            if (lives <= 0) { gameState = 'gameover'; } else { loadLevel(currentLevel); }
                        }
                    } else {
                        lives--;
                        updateUI();
                        if (lives <= 0) { gameState = 'gameover'; } else { loadLevel(currentLevel); }
                    }
                }

                if (player.invincible > 0) player.invincible--;
                updateParticles();
                updateUI();
            }

            function updateParticles() {
                for (const p of particles) { p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity || 0.05;
                    p.life--; }
                particles = particles.filter(p => p.life > 0);
            }

            function updateUI() {
                scoreSpan.textContent = score;
                livesSpan.textContent = lives;
                coinSpan.textContent = coinsCollected;
                if (device === 'phone') {
                    document.getElementById('livesSidebar').textContent = lives;
                    document.getElementById('coinSidebar').textContent = coinsCollected;
                    document.getElementById('levelSidebar').textContent = (currentLevel + 1) + '/' + LEVELS.length;
                }
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);

                if (gameState === 'menu') {
                    const g = ctx.createLinearGradient(0, 0, 0, H);
                    g.addColorStop(0, '#0b0b2a');
                    g.addColorStop(0.5, '#162044');
                    g.addColorStop(1, '#1a2a3a');
                    ctx.fillStyle = g;
                    ctx.fillRect(0, 0, W, H);
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#4a4aff';
                    ctx.font = 'bold 64px monospace';
                    ctx.shadowColor = 'rgba(74,74,255,0.5)';
                    ctx.shadowBlur = 20;
                    ctx.fillText('G-endosh', W / 2, 140);
                    ctx.shadowBlur = 0;
                    const bx = W / 2,
                        by = 280,
                        bw = 260,
                        bh = 110;
                    ctx.shadowColor = 'rgba(0,255,255,0.5)';
                    ctx.shadowBlur = 30;
                    ctx.beginPath();
                    ctx.ellipse(bx, by, bw / 2, bh / 2, 0, 0, Math.PI * 2);
                    ctx.fillStyle = '#00ffff';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ff0000';
                    ctx.font = 'bold 64px monospace';
                    ctx.shadowColor = 'rgba(255,0,0,0.5)';
                    ctx.shadowBlur = 15;
                    ctx.fillText('СТАРТ', bx, by + 6);
                    ctx.shadowBlur = 0;
                    return;
                }

                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#0b0b2a');
                grad.addColorStop(0.5, '#162044');
                grad.addColorStop(1, '#1a2a3a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                for (let i = 0; i < 40; i++) {
                    const sx = (i * 137 + i * i * 7) % W,
                        sy = (i * 89 + i * i * 13) % (H * 0.6);
                    ctx.beginPath();
                    ctx.arc(sx, sy, 0.5 + (i % 3) * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                for (const p of platforms) {
                    if (p.type === 'ground') {
                        const g = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
                        g.addColorStop(0, '#4a6a4a');
                        g.addColorStop(0.3, '#3a5a3a');
                        g.addColorStop(1, '#2a3a2a');
                        ctx.fillStyle = g;
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                        ctx.fillStyle = '#5a8a4a';
                        ctx.fillRect(p.x, p.y, p.w, 4);
                    } else {
                        const g = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
                        g.addColorStop(0, '#8a7a6a');
                        g.addColorStop(0.5, '#6a5a4a');
                        g.addColorStop(1, '#4a3a2a');
                        ctx.fillStyle = g;
                        ctx.shadowColor = 'rgba(0,0,0,0.3)';
                        ctx.shadowBlur = 8;
                        ctx.fillRect(p.x, p.y, p.w, p.h);
                        ctx.shadowBlur = 0;
                    }
                }

                for (const t of trampolines) {
                    ctx.fillStyle = '#666';
                    for (let i = 0; i < 3; i++) ctx.fillRect(t.x + 6 + i * 12, t.y + 4, 3, 8);
                    const bounce = t.cooldown > 0 ? 4 : 0;
                    const g = ctx.createLinearGradient(0, t.y - bounce, 0, t.y + t.h - bounce);
                    g.addColorStop(0, '#ff6b6b');
                    g.addColorStop(0.4, '#ee5a24');
                    g.addColorStop(1, '#aa3a1a');
                    ctx.fillStyle = g;
                    ctx.shadowColor = 'rgba(255,100,50,0.4)';
                    ctx.shadowBlur = 16;
                    ctx.fillRect(t.x, t.y - bounce, t.w, t.h + bounce);
                    ctx.shadowBlur = 0;
                }

                for (const coin of coins) {
                    if (coin.collected) continue;
                    const pulse = 1 + Math.sin(frame * 0.06 + coin.x) * 0.08,
                        r = coin.r * pulse;
                    ctx.shadowColor = 'rgba(255,215,0,0.5)';
                    ctx.shadowBlur = 16;
                    const g = ctx.createRadialGradient(coin.x - 3, coin.y - 3, 2, coin.x, coin.y, r);
                    g.addColorStop(0, '#ffd700');
                    g.addColorStop(0.7, '#ffb300');
                    g.addColorStop(1, '#cc8800');
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(coin.x, coin.y, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                if (keyItem && !keyItem.collected) {
                    ctx.shadowColor = 'rgba(255,215,0,0.8)';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#ffd700';
                    ctx.fillRect(keyItem.x + 8, keyItem.y, 4, 20);
                    ctx.beginPath();
                    ctx.arc(keyItem.x + 10, keyItem.y + 22, 6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff6b00';
                    ctx.beginPath();
                    ctx.arc(keyItem.x + 10, keyItem.y + 22, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                if (cage) {
                    ctx.strokeStyle = cage.open ? '#4f4' : '#ff6b6b';
                    ctx.lineWidth = 3;
                    ctx.shadowColor = cage.open ? 'rgba(0,255,0,0.3)' : 'rgba(255,0,0,0.3)';
                    ctx.shadowBlur = 15;
                    ctx.strokeRect(cage.x, cage.y, cage.w, cage.h);
                    for (let i = 0; i < cage.w; i += 15) { ctx.beginPath();
                        ctx.moveTo(cage.x + i, cage.y);
                        ctx.lineTo(cage.x + i, cage.y + cage.h);
                        ctx.stroke(); }
                    for (let i = 0; i < cage.h; i += 15) { ctx.beginPath();
                        ctx.moveTo(cage.x, cage.y + i);
                        ctx.lineTo(cage.x + cage.w, cage.y + i);
                        ctx.stroke(); }
                    ctx.shadowBlur = 0;
                    if (!cage.open) {
                        ctx.font = '50px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = '#ff0000';
                        ctx.fillText('🍄', cage.x + cage.w / 2, cage.y + cage.h / 2 + 5);
                        ctx.font = '20px sans-serif';
                        ctx.fillStyle = '#ff6b6b';
                        ctx.fillText('🔒', cage.x + cage.w / 2, cage.y - 15);
                    } else {
                        ctx.font = '60px sans-serif';
                        ctx.fillStyle = '#ff0000';
                        ctx.fillText('⭐', cage.x + cage.w / 2, cage.y + cage.h / 2 + 5);
                        ctx.font = '16px sans-serif';
                        ctx.fillStyle = '#4f4';
                        ctx.fillText('✅ СВОБОДЕН!', cage.x + cage.w / 2, cage.y - 15);
                        const mx = cage.x + cage.w / 2 + Math.sin(frame * 0.03) * 60,
                            my = cage.y + cage.h / 2 + Math.cos(frame * 0.02) * 30;
                        ctx.font = '40px sans-serif';
                        ctx.fillStyle = '#ff0000';
                        ctx.fillText('🍄', mx, my);
                    }
                }

                if (goal) {
                    if (goal.active) {
                        const pulse = 1 + Math.sin(frame * 0.04) * 0.05,
                            gw = goal.w * pulse,
                            gh = goal.h * pulse,
                            gx = goal.x + (goal.w - gw) / 2,
                            gy = goal.y + (goal.h - gh) / 2;
                        ctx.shadowColor = 'rgba(255,200,100,0.6)';
                        ctx.shadowBlur = 40;
                        const g = ctx.createLinearGradient(gx, gy, gx + gw, gy);
                        g.addColorStop(0, '#ff6b6b');
                        g.addColorStop(0.3, '#ffd93d');
                        g.addColorStop(0.7, '#6bcb77');
                        g.addColorStop(1, '#4fc3f7');
                        ctx.fillStyle = g;
                        ctx.beginPath();
                        ctx.moveTo(gx + 4, gy + 4);
                        ctx.lineTo(gx + gw - 4, gy + gh / 2);
                        ctx.lineTo(gx + 4, gy + gh - 4);
                        ctx.closePath();
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#fff';
                        ctx.font = 'bold 28px monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        const arrowY = gy + gh / 2 + Math.sin(frame * 0.06) * 6;
                        ctx.fillText('▶', gx + gw / 2, arrowY);
                        ctx.font = '14px monospace';
                        ctx.fillStyle = '#ffd700';
                        ctx.fillText('ВХОД', gx + gw / 2, gy + gh + 18);
                        if (frame % 6 === 0) {
                            spawnParticles(gx + gw / 2 + (Math.random() - 0.5) * 30,
                                gy + gh / 2 + (Math.random() - 0.5) * 30,
                                ['#ffd700', '#ff6b6b', '#4fc3f7'][Math.floor(Math.random() * 3)], 2);
                        }
                        if (cage && cage.open) {
                            ctx.fillStyle = '#ffd700';
                            ctx.font = '14px monospace';
                            ctx.fillText('🎉 +1000', gx + gw / 2, gy - 22);
                        }
                    } else {
                        ctx.globalAlpha = 0.5;
                        ctx.fillStyle = '#2a2a4a';
                        ctx.fillRect(goal.x + 16, goal.y - 12, 4, 52);
                        ctx.fillStyle = '#666';
                        ctx.shadowColor = 'rgba(100,100,100,0.3)';
                        ctx.shadowBlur = 10;
                        ctx.beginPath();
                        ctx.moveTo(goal.x + 4, goal.y + 4);
                        ctx.lineTo(goal.x + goal.w - 4, goal.y + goal.h / 2);
                        ctx.lineTo(goal.x + 4, goal.y + goal.h - 4);
                        ctx.closePath();
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        let c = 0;
                        for (const coin of coins)
                            if (coin.collected) c++;
                        const need = requiredCoinsForGoal;
                        const txt = c + '/' + need + (cage ? (cage.open ? ' ✅' : ' 🔑') : '');
                        ctx.fillStyle = c >= need ? 'rgba(100,255,100,0.8)' : 'rgba(255,200,100,0.8)';
                        ctx.font = 'bold 16px monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(txt, goal.x + goal.w / 2, goal.y + goal.h / 2 + 1);
                        if (c >= need && (!cage || cage.open)) {
                            ctx.fillStyle = 'rgba(255,215,0,0.6)';
                            ctx.font = '12px monospace';
                            ctx.fillText('✨ готово!', goal.x + goal.w / 2, goal.y + goal.h + 18);
                        } else if (cage && !cage.open) {
                            ctx.fillStyle = 'rgba(255,100,100,0.5)';
                            ctx.font = '12px monospace';
                            ctx.fillText('🔑 нужен ключ', goal.x + goal.w / 2, goal.y + goal.h + 18);
                        }
                        ctx.globalAlpha = 1;
                    }
                }

                drawPlayer();

                for (const p of particles) {
                    const a = p.life / p.maxLife;
                    ctx.globalAlpha = a;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }

                if (gameState === 'gameover') {
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ff6b6b';
                    ctx.font = 'bold 48px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(255,0,0,0.3)';
                    ctx.shadowBlur = 30;
                    ctx.fillText('💔 GAME OVER', W / 2, H / 2 - 20);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ccd';
                    ctx.font = '20px monospace';
                    ctx.fillText('Нажмите ↺', W / 2, H / 2 + 50);
                }
                if (gameState === 'win') {
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 48px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.shadowColor = 'rgba(255,215,0,0.5)';
                    ctx.shadowBlur = 40;
                    ctx.fillText('🏆 ВСЕ УРОВНИ ПРОЙДЕНЫ!', W / 2, H / 2 - 20);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#ccd';
                    ctx.font = '20px monospace';
                    ctx.fillText('Счёт: ' + score + '  •  Нажмите ↺', W / 2, H / 2 + 60);
                }
            }

            function drawPlayer() {
                const p = player,
                    px = p.x,
                    py = p.y;
                if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0) ctx.globalAlpha = 0.5;
                ctx.save();
                ctx.translate(px + p.w / 2, py + p.h);
                if (p.facing < 0) ctx.scale(-1, 1);
                const s = 1;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 12;
                ctx.shadowOffsetY = 4;

                const body = ctx.createLinearGradient(0, -32 * s, 0, -6 * s);
                body.addColorStop(0, '#f5e6d0');
                body.addColorStop(0.2, '#f0dcc4');
                body.addColorStop(1, '#e8c8a8');
                ctx.fillStyle = body;
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 2;
                ctx.beginPath();
                ctx.roundRect(-10 * s, -28 * s, 20 * s, 22 * s, 4 * s);
                ctx.fill();

                const dress = ctx.createLinearGradient(0, -14 * s, 0, -4 * s);
                dress.addColorStop(0, '#d4e8f0');
                dress.addColorStop(0.5, '#c0d8e8');
                dress.addColorStop(1, '#a8c8d8');
                ctx.fillStyle = dress;
                ctx.shadowBlur = 4;
                ctx.shadowOffsetY = 1;
                ctx.beginPath();
                ctx.moveTo(-12 * s, -12 * s);
                ctx.quadraticCurveTo(-16 * s, -6 * s, -12 * s, -2 * s);
                ctx.lineTo(12 * s, -2 * s);
                ctx.quadraticCurveTo(16 * s, -6 * s, 12 * s, -12 * s);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#c8a060';
                ctx.fillRect(-10 * s, -14 * s, 20 * s, 3 * s);

                ctx.shadowBlur = 6;
                ctx.shadowOffsetY = 2;
                const head = ctx.createRadialGradient(-2 * s, -36 * s, 2 * s, 0, -32 * s, 12 * s);
                head.addColorStop(0, '#f5e6d0');
                head.addColorStop(0.7, '#f0dcc4');
                head.addColorStop(1, '#e0c8b0');
                ctx.fillStyle = head;
                ctx.beginPath();
                ctx.arc(0, -32 * s, 11 * s, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 2;
                ctx.shadowOffsetY = 0;
                ctx.fillStyle = '#f5d080';
                ctx.beginPath();
                ctx.ellipse(0, -36 * s, 13 * s, 10 * s, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#edc060';
                ctx.beginPath();
                ctx.moveTo(-12 * s, -36 * s);
                ctx.quadraticCurveTo(-8 * s, -44 * s, -2 * s, -40 * s);
                ctx.quadraticCurveTo(2 * s, -44 * s, 8 * s, -40 * s);
                ctx.quadraticCurveTo(12 * s, -36 * s, 10 * s, -32 * s);
                ctx.quadraticCurveTo(6 * s, -34 * s, 0, -32 * s);
                ctx.quadraticCurveTo(-6 * s, -34 * s, -12 * s, -36 * s);
                ctx.closePath();
                ctx.fill();

                ctx.fillStyle = '#e8b850';
                ctx.fillRect(-14 * s, -34 * s, 3 * s, 10 * s);
                ctx.fillRect(11 * s, -34 * s, 3 * s, 10 * s);
                ctx.beginPath();
                ctx.moveTo(8 * s, -32 * s);
                ctx.quadraticCurveTo(14 * s, -30 * s, 12 * s, -24 * s);
                ctx.quadraticCurveTo(10 * s, -20 * s, 6 * s, -22 * s);
                ctx.quadraticCurveTo(8 * s, -26 * s, 6 * s, -30 * s);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-7 * s, -35 * s, 5 * s, 5 * s);
                ctx.fillRect(2 * s, -35 * s, 5 * s, 5 * s);
                const eye = ctx.createRadialGradient(-5 * s, -33 * s, 1 * s, -5 * s, -33 * s, 3 * s);
                eye.addColorStop(0, '#ffd700');
                eye.addColorStop(0.6, '#d4a800');
                eye.addColorStop(1, '#8a6a00');
                ctx.fillStyle = eye;
                ctx.beginPath();
                ctx.arc(-5 * s, -33 * s, 2.5 * s, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(4 * s, -33 * s, 2.5 * s, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                ctx.arc(-4 * s, -34 * s, 1 * s, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(5 * s, -34 * s, 1 * s, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#c08070';
                ctx.lineWidth = 1.5 * s;
                ctx.beginPath();
                ctx.arc(0, -29 * s, 3 * s, 0.1, Math.PI - 0.1);
                ctx.stroke();

                ctx.fillStyle = '#ff6b9d';
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(255,100,150,0.3)';
                for (let i = 0; i < 5; i++) {
                    const a = i / 5 * Math.PI * 2 + frame * 0.02;
                    const fx = 10 * s + Math.cos(a) * 4 * s,
                        fy = -38 * s + Math.sin(a) * 4 * s;
                    ctx.beginPath();
                    ctx.arc(fx, fy, 2.5 * s, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(10 * s, -38 * s, 2 * s, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 2;
                ctx.shadowOffsetY = 1;
                ctx.fillStyle = '#f0dcc4';
                ctx.fillRect(-13 * s, -26 * s, 4 * s, 10 * s);
                ctx.fillRect(9 * s, -26 * s, 4 * s, 10 * s);
                ctx.fillStyle = '#d4b8a0';
                ctx.fillRect(-8 * s, -4 * s, 6 * s, 6 * s);
                ctx.fillRect(2 * s, -4 * s, 6 * s, 6 * s);
                ctx.fillStyle = '#8a6a4a';
                ctx.fillRect(-8 * s, -2 * s, 6 * s, 2 * s);
                ctx.fillRect(2 * s, -2 * s, 6 * s, 2 * s);

                ctx.restore();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
            }

            if (!CanvasRenderingContext2D.prototype.roundRect) {
                CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                    if (r > w / 2) r = w / 2;
                    if (r > h / 2) r = h / 2;
                    this.moveTo(x + r, y);
                    this.lineTo(x + w - r, y);
                    this.quadraticCurveTo(x + w, y, x + w, y + r);
                    this.lineTo(x + w, y + h - r);
                    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                    this.lineTo(x + r, y + h);
                    this.quadraticCurveTo(x, y + h, x, y + h - r);
                    this.lineTo(x, y + r);
                    this.quadraticCurveTo(x, y, x + r, y);
                    return this;
                };
            }

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            document.addEventListener('keydown', (e) => {
                const key = e.key;
                if (gameState === 'menu') {
                    if (key === ' ' || key === 'Space' || key === 'Enter') { e.preventDefault();
                        startGame(); }
                    return;
                }
                if (key === 'ArrowLeft' || key === 'Left') { e.preventDefault();
                    keys['ArrowLeft'] = true; }
                if (key === 'ArrowRight' || key === 'Right') { e.preventDefault();
                    keys['ArrowRight'] = true; }
                if (key === ' ' || key === 'Space') { e.preventDefault();
                    keys['Space'] = true;
                    jumpKeyDown = true;
                    jumpKeyProcessed = false; }
                if (key === 'a' || key === 'A') keys['KeyA'] = true;
                if (key === 'd' || key === 'D') keys['KeyD'] = true;
            });
            document.addEventListener('keyup', (e) => {
                const key = e.key;
                if (gameState === 'menu') return;
                if (key === 'ArrowLeft' || key === 'Left') { e.preventDefault();
                    keys['ArrowLeft'] = false; }
                if (key === 'ArrowRight' || key === 'Right') { e.preventDefault();
                    keys['ArrowRight'] = false; }
                if (key === ' ' || key === 'Space') { e.preventDefault();
                    keys['Space'] = false;
                    jumpKeyDown = false;
                    jumpKeyProcessed = false; }
                if (key === 'a' || key === 'A') keys['KeyA'] = false;
                if (key === 'd' || key === 'D') keys['KeyD'] = false;
            });

            document.querySelectorAll('[data-key]').forEach(btn => {
                const key = btn.dataset.key;
                let touchId = null;

                const press = (e) => {
                    e.preventDefault();
                    if (gameState === 'menu') { startGame(); return; }
                    if (e.type === 'touchstart') {
                        const touch = e.changedTouches[0];
                        touchId = touch.identifier;
                    }
                    keys[key] = true;
                    if (key === 'Space') {
                        jumpKeyDown = true;
                        jumpKeyProcessed = false;
                    }
                    btn.classList.add('pressed');
                    btn.style.transform = 'translateY(4px)';
                    if (key === 'Space') {
                        btn.style.boxShadow = '0 1px 0 #3a2a5a';
                    } else {
                        btn.style.boxShadow = '0 1px 0 #1a1a2e';
                    }
                };

                const release = (e) => {
                    e.preventDefault();
                    if (gameState === 'menu') return;
                    if (e.type === 'touchend' || e.type === 'touchcancel') {
                        let shouldRelease = true;
                        if (e.type === 'touchend' && touchId !== null) {
                            let found = false;
                            for (const t of e.changedTouches) {
                                if (t.identifier === touchId) { found = true; break; }
                            }
                            if (!found) shouldRelease = false;
                        }
                        if (!shouldRelease) return;
                        touchId = null;
                    }
                    keys[key] = false;
                    if (key === 'Space') {
                        jumpKeyDown = false;
                        jumpKeyProcessed = false;
                    }
                    btn.classList.remove('pressed');
                    btn.style.transform = '';
                    if (key === 'Space') {
                        btn.style.boxShadow = '';
                    } else {
                        btn.style.boxShadow = '';
                    }
                };

                btn.addEventListener('mousedown', press);
                btn.addEventListener('touchstart', press, { passive: false });
                btn.addEventListener('mouseup', release);
                btn.addEventListener('touchend', release, { passive: false });
                btn.addEventListener('mouseleave', release);
                btn.addEventListener('touchcancel', release, { passive: false });
                btn.addEventListener('contextmenu', (e) => e.preventDefault());
            });

            document.addEventListener('touchmove', (e) => {
                if (e.target.closest('.pda') || e.target.closest('.shop-overlay')) {
                    e.preventDefault();
                }
            }, { passive: false });

            restartBtn.addEventListener('click', () => { if (gameState !== 'menu') restartGame(); });
            restartBtnSide.addEventListener('click', () => { if (gameState !== 'menu') restartGame(); });
            restartBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (gameState !== 'menu') restartGame(); },
                { passive: false });
            restartBtnSide.addEventListener('touchstart', (e) => { e.preventDefault(); if (gameState !== 'menu')
                    restartGame(); }, { passive: false });

            canvas.addEventListener('click', (e) => {
                if (gameState === 'menu') {
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width,
                        scaleY = canvas.height / rect.height;
                    const x = (e.clientX - rect.left) * scaleX,
                        y = (e.clientY - rect.top) * scaleY;
                    if (x > W / 2 - 130 && x < W / 2 + 130 && y > 225 && y < 335) startGame();
                }
            });
            canvas.addEventListener('touchstart', (e) => {
                if (gameState === 'menu') {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const touch = e.touches[0];
                    const scaleX = canvas.width / rect.width,
                        scaleY = canvas.height / rect.height;
                    const x = (touch.clientX - rect.left) * scaleX,
                        y = (touch.clientY - rect.top) * scaleY;
                    if (x > W / 2 - 130 && x < W / 2 + 130 && y > 225 && y < 335) startGame();
                }
            }, { passive: false });

            function resizeCanvas() {
                const wrap = canvas.parentElement;
                if (!wrap) return;
                const rect = wrap.getBoundingClientRect();
                const ratio = 800 / 520;
                let w = rect.width,
                    h = w / ratio;
                if (h > rect.height) { h = rect.height;
                    w = h * ratio; }
                canvas.style.width = w + 'px';
                canvas.style.height = h + 'px';
                // Принудительно перерисовываем
                draw();
            }
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('orientationchange', () => { setTimeout(resizeCanvas, 300); });
            setTimeout(resizeCanvas, 50);

            gameLoop();

            setTimeout(() => {
                if (device === 'pc' && promptEl.style.display !== 'none') {
                    promptEl.classList.add('active');
                    promptEl.style.display = 'flex';
                }
            }, 500);

        })();
    </script>
</body>
</html>
