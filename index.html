<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Genshin PDA</title>
    
    <!-- PWA Meta -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Genshin PDA" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            background: #1a1a2e;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
        }
        .pda {
            background: #2d2d44;
            border-radius: 30px 30px 25px 25px;
            padding: 12px 12px 18px 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 -4px 8px rgba(0, 0, 0, 0.6), inset 0 4px 8px rgba(255, 255, 255, 0.08);
            border: 2px solid #4a4a6a;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }
        .pwa-install-banner {
            background: linear-gradient(135deg, #4a2a6a, #2a4a6a);
            color: #fff;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: clamp(8px, 1.2vw, 12px);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #6a4a8a;
            flex-shrink: 0;
            white-space: nowrap;
        }
        .pwa-install-banner:hover {
            background: linear-gradient(135deg, #5a3a7a, #3a5a7a);
            transform: scale(1.02);
        }
        .pwa-install-banner .icon {
            font-size: clamp(12px, 1.5vw, 18px);
        }
        .pda-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2px 6px 2px;
            color: #8af0c0;
            font-size: clamp(9px, 1.4vw, 14px);
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(138, 240, 192, 0.3);
            flex-shrink: 0;
            gap: 4px;
            flex-wrap: nowrap;
            min-height: 28px;
        }
        .pda-top .top-group {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: nowrap;
        }
        .pda-top .led {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4f4;
            box-shadow: 0 0 10px #4f4;
            margin-right: 4px;
            flex-shrink: 0;
        }
        .pda-top .top-stat {
            display: flex;
            align-items: center;
            gap: 2px;
            background: #1a1a30;
            padding: 1px 6px;
            border-radius: 10px;
            border: 1px solid #3a3a5a;
            flex-shrink: 0;
            font-size: clamp(8px, 1vw, 12px);
        }
        .pda-top .top-stat span {
            color: #ffd866;
        }
        .pda-top .top-btn {
            background: #3a3a5a;
            border: none;
            border-radius: 10px;
            color: #ccd;
            font-weight: bold;
            padding: 2px 8px;
            box-shadow: 0 3px 0 #1a1a2e, inset 0 2px 4px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.06s ease;
            font-family: 'Courier New', monospace;
            font-size: clamp(8px, 1.2vw, 12px);
            touch-action: manipulation;
            flex-shrink: 0;
            line-height: 1.4;
        }
        .pda-top .top-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1a1a2e;
        }
        .pda-top .top-btn.shop {
            background: #5a4a7a;
            color: #f0e0ff;
            box-shadow: 0 3px 0 #3a2a4a;
        }
        .pda-top .top-btn.restart {
            background: #4a3a5a;
            color: #f0e0ff;
            box-shadow: 0 3px 0 #2a1a3a;
        }
        .pda-top .top-btn.fullscreen {
            background: #2a4a6a;
            color: #f0e0ff;
            box-shadow: 0 3px 0 #1a2a4a;
            font-size: clamp(12px, 1.5vw, 16px);
            padding: 2px 6px;
        }
        .buff-badge {
            display: inline-block;
            font-size: clamp(7px, 0.8vw, 10px);
            padding: 1px 4px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        .buff-badge.active {
            background: rgba(255,215,0,0.2);
            border-color: #ffd700;
        }
        .pda-screen-wrap {
            background: #0d0d1a;
            border-radius: 12px;
            padding: 4px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9), 0 0 0 2px #3a3a5a;
            flex-shrink: 1;
            width: 100%;
            touch-action: none;
            flex: 1 1 auto;
            min-height: 0;
        }
        .pda-screen {
            background: #101020;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            width: 100%;
            height: 100%;
            aspect-ratio: 800 / 520;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #101020;
            image-rendering: pixelated;
            touch-action: none;
        }
        .pda-bottom {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 6px;
            gap: 4px;
            flex-shrink: 0;
            width: 100%;
            min-height: 60px;
        }
        .pda-controls-left {
            display: flex;
            gap: 6px;
            align-items: center;
            flex: 1;
        }
        .ctrl-btn {
            background: #4a4a6e;
            border: none;
            border-radius: 14px;
            color: #ccd;
            font-weight: bold;
            box-shadow: 0 4px 0 #1a1a2e, inset 0 2px 4px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.06s ease;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .ctrl-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #1a1a2e;
        }
        .ctrl-btn.arrow {
            width: clamp(50px, 10vw, 80px);
            height: clamp(50px, 10vw, 80px);
            font-size: clamp(24px, 4vw, 36px);
            border-radius: 16px;
        }
        .pda-controls-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            flex: 1;
        }
        .ctrl-btn.jump {
            background: #6a4a8a;
            color: #f0e0ff;
            box-shadow: 0 4px 0 #3a2a5a, inset 0 2px 4px rgba(255, 255, 255, 0.15);
            width: clamp(60px, 12vw, 100px);
            height: clamp(60px, 12vw, 100px);
            font-size: clamp(32px, 5vw, 48px);
            border-radius: 50%;
        }
        .ctrl-btn.jump:active {
            background: #7a5a9a;
            transform: translateY(4px);
            box-shadow: 0 1px 0 #3a2a5a;
        }
        .shop-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            touch-action: none;
        }
        .shop-overlay.open {
            display: flex;
        }
        .shop-modal {
            background: #2a2a44;
            border-radius: 32px;
            padding: 20px 24px;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            border: 2px solid #5a5a8a;
            color: #ccd;
            touch-action: auto;
        }
        .shop-modal h2 {
            text-align: center;
            color: #ffd866;
            font-size: clamp(20px, 3.5vw, 28px);
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 216, 102, 0.2);
        }
        .shop-modal .close-btn {
            float: right;
            background: none;
            border: none;
            color: #aac;
            font-size: clamp(22px, 3.5vw, 30px);
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            padding: 4px 8px;
        }
        .shop-modal .close-btn:hover {
            color: #fff;
            transform: scale(1.1);
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e38;
            padding: 8px 12px;
            border-radius: 14px;
            margin-bottom: 8px;
            border-left: 6px solid #6a4a8a;
            transition: 0.2s;
            gap: 6px;
            flex-wrap: wrap;
        }
        .shop-item:hover {
            background: #2a2a4e;
        }
        .shop-item .info {
            flex: 1;
            min-width: 60px;
        }
        .shop-item .name {
            font-weight: bold;
            font-size: clamp(12px, 1.6vw, 16px);
        }
        .shop-item .desc {
            font-size: clamp(9px, 1vw, 12px);
            color: #99a;
            margin-top: 2px;
        }
        .shop-item .price {
            font-size: clamp(11px, 1.4vw, 15px);
            color: #ffd866;
            margin-right: 6px;
            white-space: nowrap;
        }
        .shop-item .buy-btn {
            background: #4a6a8a;
            border: none;
            border-radius: 24px;
            color: #fff;
            font-weight: bold;
            padding: 5px 12px;
            cursor: pointer;
            box-shadow: 0 3px 0 #1a2a3a;
            transition: 0.06s ease;
            font-family: inherit;
            font-size: clamp(10px, 1.2vw, 14px);
            min-width: clamp(45px, 8vw, 65px);
            touch-action: manipulation;
        }
        .shop-item .buy-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1a2a3a;
        }
        .shop-item .buy-btn:disabled {
            opacity: 0.4;
            transform: none;
            box-shadow: 0 3px 0 #1a2a3a;
            cursor: not-allowed;
        }
        .shop-item .bought {
            color: #6f6;
            font-weight: bold;
            font-size: clamp(11px, 1.4vw, 15px);
            white-space: nowrap;
        }
        .shop-currency {
            text-align: right;
            font-size: clamp(12px, 1.6vw, 16px);
            color: #ffd866;
            margin-bottom: 10px;
            padding: 3px 10px;
            background: #1a1a30;
            border-radius: 24px;
            display: inline-block;
        }

        /* Специальные стили для горизонтальной ориентации на телефонах */
        @media (max-width: 768px) and (orientation: landscape) {
            .pda {
                border-radius: 16px 16px 12px 12px;
                padding: 8px 10px 12px 10px;
                max-width: 100vw;
                max-height: 100vh;
                height: 100vh;
                border-width: 1px;
            }
            .pda-top {
                font-size: clamp(8px, 1.2vw, 11px);
                padding: 0 2px 4px 2px;
                min-height: 22px;
            }
            .pda-top .top-stat {
                padding: 1px 4px;
                font-size: clamp(7px, 0.9vw, 10px);
                border-radius: 8px;
            }
            .pda-top .top-btn {
                padding: 2px 6px;
                font-size: clamp(7px, 0.9vw, 10px);
                border-radius: 8px;
            }
            .pda-top .top-btn.fullscreen {
                font-size: clamp(10px, 1.2vw, 14px);
                padding: 2px 5px;
            }
            .pda-screen-wrap {
                padding: 3px;
                border-radius: 8px;
            }
            .pda-screen {
                border-radius: 6px;
            }
            .pda-bottom {
                padding-top: 4px;
                min-height: 44px;
            }
            .ctrl-btn.arrow {
                width: clamp(40px, 8vw, 60px);
                height: clamp(40px, 8vw, 60px);
                font-size: clamp(18px, 3vw, 28px);
                border-radius: 12px;
            }
            .ctrl-btn.jump {
                width: clamp(50px, 10vw, 80px);
                height: clamp(50px, 10vw, 80px);
                font-size: clamp(26px, 4vw, 38px);
                border-radius: 50%;
            }
            .pda-controls-left {
                gap: 4px;
            }
            .pda-controls-right {
                gap: 4px;
            }
            .pwa-install-banner {
                font-size: 6px;
                padding: 2px 6px;
                border-radius: 10px;
            }
            .pwa-install-banner .icon {
                font-size: 10px;
            }
            .buff-badge {
                font-size: clamp(6px, 0.7vw, 9px);
                padding: 1px 3px;
            }
        }

        @media (max-width: 480px) and (orientation: landscape) {
            .ctrl-btn.arrow {
                width: clamp(32px, 7vw, 50px);
                height: clamp(32px, 7vw, 50px);
                font-size: clamp(14px, 2.5vw, 22px);
                border-radius: 10px;
            }
            .ctrl-btn.jump {
                width: clamp(40px, 9vw, 65px);
                height: clamp(40px, 9vw, 65px);
                font-size: clamp(20px, 3.5vw, 32px);
            }
            .pda-top .top-stat {
                font-size: clamp(6px, 0.8vw, 8px);
                padding: 1px 3px;
            }
            .pda-top .top-btn {
                font-size: clamp(6px, 0.8vw, 8px);
                padding: 1px 4px;
            }
        }

        @media (max-width: 768px) and (orientation: portrait) {
            .pda {
                border-radius: 14px;
                padding: 6px 6px 10px 6px;
                max-width: 100vw;
                max-height: 100dvh;
                height: 100dvh;
                justify-content: space-between;
            }
            .pda-top {
                font-size: clamp(8px, 1.8vw, 12px);
                padding: 2px 2px 4px 2px;
                gap: 3px;
                min-height: 20px;
            }
            .pda-top .top-stat {
                padding: 1px 4px;
                font-size: clamp(7px, 1.5vw, 10px);
            }
            .pda-top .top-btn {
                padding: 2px 5px;
                font-size: clamp(7px, 1.5vw, 10px);
                border-radius: 6px;
            }
            .pda-screen-wrap {
                padding: 3px;
                border-radius: 8px;
            }
            .pda-screen {
                border-radius: 4px;
            }
            .pda-bottom {
                padding-top: 4px;
                min-height: 50px;
            }
            .ctrl-btn.arrow {
                width: clamp(45px, 14vw, 70px);
                height: clamp(45px, 14vw, 70px);
                font-size: clamp(18px, 4vw, 30px);
                border-radius: 12px;
            }
            .ctrl-btn.jump {
                width: clamp(55px, 17vw, 85px);
                height: clamp(55px, 17vw, 85px);
                font-size: clamp(24px, 5vw, 40px);
                border-radius: 50%;
            }
            .pda-controls-left {
                gap: 4px;
            }
            .pda-controls-right {
                gap: 4px;
            }
            .pwa-install-banner {
                font-size: 6px;
                padding: 2px 5px;
            }
            .pwa-install-banner .icon {
                font-size: 9px;
            }
        }

        @media (max-width: 400px) and (orientation: portrait) {
            .ctrl-btn.arrow {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }
            .ctrl-btn.jump {
                width: 50px;
                height: 50px;
                font-size: 20px;
            }
            .pda-top .top-stat {
                font-size: 6px;
                padding: 1px 3px;
            }
        }

        /* Fullscreen mode */
        .pda.fullscreen {
            border-radius: 0;
            padding: 4px 6px 8px 6px;
            max-width: 100vw;
            max-height: 100vh;
            width: 100vw;
            height: 100vh;
            border: none;
            box-shadow: none;
        }
        .pda.fullscreen .pda-top .top-btn.fullscreen {
            background: #6a4a3a;
            box-shadow: 0 3px 0 #3a2a1a;
        }
        @media (max-width: 768px) and (orientation: landscape) {
            .pda.fullscreen {
                padding: 4px 6px 6px 6px;
            }
        }
    </style>
</head>
<body>
<div class="pda" id="pdaContainer">
    <div class="pda-top">
        <div class="top-group">
            <span class="led"></span> GENSHIN
        </div>
        <div class="top-group">
            <div class="top-stat">❤️ <span id="livesDisplay">3</span></div>
            <div class="top-stat">🪙 <span id="coinDisplay">0</span></div>
            <div class="top-stat">🏁 <span id="levelDisplay">1</span>/20</div>
            <div class="buff-badge" id="buffDisplay">✨</div>
            <button class="top-btn shop" id="shopBtn">🛒</button>
            <button class="top-btn restart" id="restartBtn">↺</button>
            <button class="top-btn fullscreen" id="fullscreenBtn">⛶</button>
            <div class="pwa-install-banner" id="installBanner" style="display:none;">
                <span class="icon">📲</span>
                <span>Установить</span>
            </div>
        </div>
        <div class="top-group">
            <span>⚡ <span id="scoreDisplay">0</span></span>
        </div>
    </div>
    <div class="pda-screen-wrap">
        <div class="pda-screen">
            <canvas id="gameCanvas" width="800" height="520"></canvas>
        </div>
    </div>
    <div class="pda-bottom">
        <div class="pda-controls-left">
            <button class="ctrl-btn arrow" data-key="ArrowLeft">◀</button>
            <button class="ctrl-btn arrow" data-key="ArrowRight">▶</button>
        </div>
        <div class="pda-controls-right">
            <button class="ctrl-btn jump" data-key="Space">●</button>
        </div>
    </div>
</div>
<div class="shop-overlay" id="shopOverlay">
    <div class="shop-modal">
        <button class="close-btn" id="shopCloseBtn">✕</button>
        <h2>🛒 Магазин стихий</h2>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="shop-currency">🪙 <span id="shopCoinDisplay">0</span></div>
            <div style="font-size:12px; color:#99a;">Купи бафф навсегда!</div>
        </div>
        <div id="shopItemsContainer"></div>
    </div>
</div>

<script>
    (function() {
        // ============ FULLSCREEN ============
        const pdaContainer = document.getElementById('pdaContainer');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        let isFullscreen = false;

        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const el = document.documentElement;
                if (el.requestFullscreen) {
                    el.requestFullscreen();
                } else if (el.webkitRequestFullscreen) {
                    el.webkitRequestFullscreen();
                }
                isFullscreen = true;
                pdaContainer.classList.add('fullscreen');
                fullscreenBtn.textContent = '⛶';
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
                isFullscreen = false;
                pdaContainer.classList.remove('fullscreen');
                fullscreenBtn.textContent = '⛶';
            }
            setTimeout(resizeCanvas, 200);
        }

        fullscreenBtn.addEventListener('click', toggleFullscreen);
        fullscreenBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            toggleFullscreen();
        }, { passive: false });

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                isFullscreen = false;
                pdaContainer.classList.remove('fullscreen');
                fullscreenBtn.textContent = '⛶';
                setTimeout(resizeCanvas, 200);
            }
        });

        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement) {
                isFullscreen = false;
                pdaContainer.classList.remove('fullscreen');
                fullscreenBtn.textContent = '⛶';
                setTimeout(resizeCanvas, 200);
            }
        });

        // ============ PWA ============
        let deferredPrompt = null;
        const installBanner = document.getElementById('installBanner');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.style.display = 'flex';
        });

        installBanner.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                if (result.outcome === 'accepted') {
                    installBanner.style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
            console.log('PWA установлено!');
        });

        // ============ ИГРА ============
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 800, H = 520;
        const scoreSpan = document.getElementById('scoreDisplay');
        const livesSpan = document.getElementById('livesDisplay');
        const coinSpan = document.getElementById('coinDisplay');
        const levelSpan = document.getElementById('levelDisplay');
        const buffDisplay = document.getElementById('buffDisplay');
        const restartBtn = document.getElementById('restartBtn');
        const shopBtn = document.getElementById('shopBtn');
        const shopOverlay = document.getElementById('shopOverlay');
        const shopCloseBtn = document.getElementById('shopCloseBtn');
        const shopCoinDisplay = document.getElementById('shopCoinDisplay');
        const shopItemsContainer = document.getElementById('shopItemsContainer');

        const BASE_GRAVITY = 0.55;
        const BASE_FRICTION = 0.82;
        const BASE_MAX_FALL = 12;
        const BASE_PLAYER_SPEED = 4.2;
        const BASE_JUMP_FORCE = -10.5;
        const TRAMPOLINE_BOOST = -11.5;

        let gameState = 'menu';
        let score = 0;
        let lives = 3;
        let coinsCollected = 0;
        let currentLevel = 0;
        let keys = {};
        let frame = 0;
        let jumpKeyDown = false;
        let jumpKeyProcessed = false;
        let totalCoinsInLevel = 0;
        let requiredCoinsForGoal = 0;

                x: data.goal.x, y: data.goal.y, w: data.goal.w, h: data.goal.h, active: false
            };
            player.x = data.playerStart.x;
            player.y = data.playerStart.y;
            player.vx = 0;
            player.vy = 0;
            player.onGround = false;
            player.jumpCount = 0;
            player.invincible = 0;
            player.facing = 1;
            applyBuffsToPlayer();
            particles = [];
            levelSpan.textContent = (index + 1) + '/' + LEVELS.length;
            updateBuffDisplay();
        }

        function applyBuffsToPlayer() {
            player.maxJumps = activeBuffs.electro ? 2 : 1;
        }

        function updateBuffDisplay() {
            const icons = [];
            if (activeBuffs.pyro) icons.push('🔥');
            if (activeBuffs.electro) icons.push('⚡');
            if (activeBuffs.anemo) icons.push('🌪️');
            if (activeBuffs.cryo) icons.push('❄️' + (cryoShieldUses > 0 ? cryoShieldUses : ''));
            if (activeBuffs.hydro) icons.push('💧');
            buffDisplay.textContent = icons.length ? icons.join('') : '✨';
        }

        const shopItems = [
            { id: 'pyro', name: '🔥 Пиро', price: 50, desc: 'Скорость +20%', effect: () => { if (!activeBuffs.pyro) { activeBuffs.pyro = true; speedMultiplier = 1.2; } } },
            { id: 'electro', name: '⚡ Электро', price: 150, desc: 'Двойной прыжок в воздухе', effect: () => { if (!activeBuffs.electro) { activeBuffs.electro = true; applyBuffsToPlayer(); } } },
            { id: 'hydro', name: '💧 Гидро', price: 250, desc: 'x2 монет при сборе', effect: () => { if (!activeBuffs.hydro) activeBuffs.hydro = true; } },
            { id: 'anemo', name: '🌪️ Анемо', price: 350, desc: 'Сила прыжка +25%', effect: () => { if (!activeBuffs.anemo) { activeBuffs.anemo = true; jumpForceMultiplier = 1.25; } } },
            { id: 'cryo', name: '❄️ Крио', price: 500, desc: 'Щит: при падении телепорт на платформу (2 раза)', effect: () => { if (!activeBuffs.cryo) { activeBuffs.cryo = true; cryoShield = true; cryoShieldUses = 2; } } }
        ];

        function renderShop() {
            shopCoinDisplay.textContent = coinsCollected;
            let html = '';
            for (const item of shopItems) {
                const bought = activeBuffs[item.id];
                const canAfford = coinsCollected >= item.price;
                html += `
                    <div class="shop-item" style="border-left-color: ${getColor(item.id)};">
                        <div class="info"><div class="name">${item.name}</div><div class="desc">${item.desc}</div></div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            ${bought ? '<span class="bought">✅ Куплен</span>' : `<span class="price">🪙 ${item.price}</span>`}
                            <button class="buy-btn" data-id="${item.id}" ${bought || !canAfford ? 'disabled' : ''}>${bought ? 'Куплен' : 'Купить'}</button>
                        </div>
                    </div>
                `;
            }
            shopItemsContainer.innerHTML = html;
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => { const id = btn.dataset.id; buyItem(id); });
                btn.addEventListener('touchstart', (e) => { e.preventDefault(); const id = btn.dataset.id; buyItem(id); }, { passive: false });
            });
        }

        function getColor(id) {
            const map = { pyro: '#ff6b35', electro: '#ffd54f', anemo: '#81c784', cryo: '#4dd0e1', hydro: '#4fc3f7' };
            return map[id] || '#6a4a8a';
        }

        function buyItem(id) {
            const item = shopItems.find(i => i.id === id);
            if (!item || activeBuffs[id]) return;
            if (coinsCollected < item.price) { alert('Недостаточно монет!'); return; }
            coinsCollected -= item.price;
            item.effect();
            updateUI();
            renderShop();
            applyBuffsToPlayer();
            updateBuffDisplay();
        }

        function openShop() { renderShop(); shopOverlay.classList.add('open'); }
        function closeShop() { shopOverlay.classList.remove('open'); }
        shopBtn.addEventListener('click', openShop);
        shopBtn.addEventListener('touchstart', (e) => { e.preventDefault(); openShop(); }, { passive: false });
        shopCloseBtn.addEventListener('click', closeShop);
        shopOverlay.addEventListener('click', (e) => { if (e.target === shopOverlay) closeShop(); });

        function startGame() {
            gameState = 'playing';
            loadLevel(0);
            updateUI();
        }

        function restartGame() {
            lives = 3;
            score = 0;
            coinsCollected = 0;
            currentLevel = 0;
            gameState = 'playing';
            jumpKeyDown = false; jumpKeyProcessed = false; keys = {};
            Object.keys(activeBuffs).forEach(k => activeBuffs[k] = false);
            speedMultiplier = 1; jumpForceMultiplier = 1; cryoShield = false; cryoShieldUses = 0;
            loadLevel(currentLevel);
            updateUI();
            updateBuffDisplay();
            closeShop();
        }

        function nextLevel() {
            if (currentLevel + 1 < LEVELS.length) {
                currentLevel++;
                loadLevel(currentLevel);
                gameState = 'playing';
                updateUI();
            } else {
                gameState = 'win';
                if (goal) {
                    spawnParticles(goal.x + goal.w / 2, goal.y + goal.h / 2, '#ffd700', 60);
                    spawnParticles(goal.x + goal.w / 2, goal.y + goal.h / 2, '#ff6b6b', 50);
                }
            }
        }

        function rectCollide(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
        function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

        function spawnParticles(x, y, color, count = 12) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 4;
                particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 1, life: 30 + Math.random() * 30, maxLife: 60, size: 3 + Math.random() * 6, color, gravity: 0.08 });
            }
        }

        function spawnCoinCollect(x, y) {
            for (let i = 0; i < 16; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 3.5;
                particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 2, life: 20 + Math.random() * 20, maxLife: 40, size: 2 + Math.random() * 5, color: '#ffd700', gravity: 0.05 });
            }
        }

        function update() {
            if (gameState === 'menu') return;
            if (gameState === 'gameover' || gameState === 'win') { updateParticles(); return; }
            frame++;
            
            if (jumpCooldown > 0) jumpCooldown--;
            
            let moveX = 0;
            if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1;
            if (keys['ArrowRight'] || keys['KeyD']) moveX = 1;
            
            if (jumpKeyDown && !jumpKeyProcessed && jumpCooldown === 0) {
                const canJump = player.onGround || (activeBuffs.electro && player.jumpCount < player.maxJumps);
                if (canJump) {
                    player.vy = BASE_JUMP_FORCE * jumpForceMultiplier;
                    player.onGround = false;
                    player.jumpCount++;
                    spawnParticles(player.x + player.w / 2, player.y + player.h, '#aaccff', 6);
                    jumpKeyProcessed = true;
                    jumpCooldown = 4;
                }
            }
            
            const currentSpeed = BASE_PLAYER_SPEED * speedMultiplier;
            player.vx += moveX * 0.8 * speedMultiplier;
            player.vx *= BASE_FRICTION;
            if (Math.abs(player.vx) > currentSpeed) player.vx = currentSpeed * Math.sign(player.vx);
            if (Math.abs(player.vx) < 0.05) player.vx = 0;
            player.vy += BASE_GRAVITY;
            if (player.vy > BASE_MAX_FALL) player.vy = BASE_MAX_FALL;
            if (Math.abs(player.vx) > 0.5) {
                player.animTimer++;
                if (player.animTimer > 6) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }
                player.facing = Math.sign(player.vx) || player.facing;
            } else { player.animFrame = 0; player.animTimer = 0; }
            player.x += player.vx;
            if (player.x < 0) player.x = 0;
            if (player.x + player.w > W) player.x = W - player.w;
            player.y += player.vy;
            player.onGround = false;
            for (const p of platforms) {
                if (rectCollide(player, p)) {
                    if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 2) {
                        player.y = p.y - player.h; player.vy = 0; player.onGround = true; player.jumpCount = 0;
                    } else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 2) {
                        player.y = p.y + p.h; player.vy = 0;
                    } else {
                        if (player.vx > 0 && player.x + player.w - player.vx <= p.x + 2) {
                            player.x = p.x - player.w; player.vx = 0;
                        } else if (player.vx < 0 && player.x - player.vx >= p.x + p.w - 2) {
                            player.x = p.x + p.w; player.vx = 0;
                        }
                    }
                }
            }
            for (const t of trampolines) {
                if (t.cooldown > 0) t.cooldown--;
                if (rectCollide(player, t) && player.vy > 0 && t.cooldown === 0 && !t.triggered) {
                    player.vy = t.bounceForce * jumpForceMultiplier;
                    player.onGround = false;
                    t.triggered = true;
                    t.cooldown = 20;
                    spawnParticles(t.x + t.w / 2, t.y, '#66ffaa', 16);
                }
                if (t.triggered && t.cooldown > 0) t.triggered = false;
            }
            
            if (keyItem && !keyItem.collected) {
                const keyRect = { x: keyItem.x, y: keyItem.y, w: keyItem.w, h: keyItem.h };
                if (rectCollide(player, keyRect)) {
                    keyItem.collected = true;
                    hasKey = true;
                    spawnParticles(keyItem.x + keyItem.w/2, keyItem.y + keyItem.h/2, '#ffd700', 30);
                }
            }
            
            if (cage && !cage.open && hasKey) {
                const cageRect = { x: cage.x, y: cage.y, w: cage.w, h: cage.h };
                if (rectCollide(player, cageRect)) {
                    cage.open = true;
                    marioFreed = true;
                    spawnParticles(cage.x + cage.w/2, cage.y + cage.h/2, '#ff6b6b', 50);
                    spawnParticles(cage.x + cage.w/2, cage.y + cage.h/2, '#ffd700', 50);
                    score += 1000;
                    updateUI();
                }
            }
            
            let coinsCollectedCount = 0;
            for (const coin of coins) {
                if (coin.collected) continue;
                const d = dist(player.x + player.w / 2, player.y + player.h / 2, coin.x, coin.y);
                if (d < coin.r + 16) {
                    coin.collected = true;
                    const multiplier = activeBuffs.hydro ? 2 : 1;
                    coinsCollected += multiplier;
                    score += 25 * multiplier;
                    spawnCoinCollect(coin.x, coin.y);
                    updateUI();
                }
                if (coin.collected) coinsCollectedCount++;
            }
            
            const allCoinsCollected = coins.every(c => c.collected);
            let coinsToCheck = 0;
            for (const coin of coins) {
                if (coin.collected) coinsToCheck++;
            }
            
            let canActivateGoal = coinsToCheck >= requiredCoinsForGoal;
            
            if (cage) {
                canActivateGoal = canActivateGoal && cage.open;
            }
            
            if (goal && !goal.active && canActivateGoal) {
                goal.active = true;
                spawnParticles(goal.x + goal.w / 2, goal.y + goal.h / 2, '#ffd700', 20);
            }
            if (goal && goal.active && rectCollide(player, goal)) {
                goal.active = false;
                nextLevel();
            }
            if (player.y > H + 50) {
                if (cryoShield && cryoShieldUses > 0) {
                    let nearest = null; let minDist = Infinity;
                    for (const p of platforms) {
                        if (p.y < 500) {
                            const d = Math.abs(player.x - (p.x + p.w / 2));
                            if (d < minDist) { minDist = d; nearest = p; }
                        }
                    }
                    if (nearest) {
                        player.x = nearest.x + (nearest.w - player.w) / 2;
                        player.y = nearest.y - player.h - 2;
                        player.vy = 0; player.vx = 0;
                        spawnParticles(player.x + player.w / 2, player.y + player.h, '#4dd0e1', 20);
                        player.onGround = true; player.jumpCount = 0;
                        cryoShieldUses--;
                        updateBuffDisplay();
                    } else { 
                        lives--; 
                        updateUI(); 
                        if (lives <= 0) { gameState = 'gameover'; currentLevel = 0; } 
                        else { loadLevel(currentLevel); }
                    }
                } else {
                    lives--; 
                    updateUI(); 
                    if (lives <= 0) { gameState = 'gameover'; currentLevel = 0; } 
                    else { loadLevel(currentLevel); }
                }
            }
            if (player.invincible > 0) player.invincible--;
            updateParticles();
            updateUI();
        }

        function updateParticles() {
            for (const p of particles) { p.x += p.vx; p.y += p.vy; p.vy += p.gravity || 0.05; p.life--; }
            particles = particles.filter(p => p.life > 0);
        }

        function updateUI() {
            scoreSpan.textContent = score; livesSpan.textContent = lives; coinSpan.textContent = coinsCollected;
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            if (gameState === 'menu') {
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#0b0b2a'); grad.addColorStop(0.5, '#162044'); grad.addColorStop(1, '#1a2a3a');
                ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = '#4a4aff'; ctx.font = 'bold 64px monospace';
                ctx.shadowColor = 'rgba(74, 74, 255, 0.5)'; ctx.shadowBlur = 20;
                ctx.fillText('G-endosh', W/2, 140);
                ctx.shadowBlur = 0;
                const btnX = W/2, btnY = 280, btnW = 260, btnH = 110;
                ctx.shadowColor = 'rgba(0, 255, 255, 0.5)'; ctx.shadowBlur = 30;
                ctx.beginPath(); ctx.ellipse(btnX, btnY, btnW/2, btnH/2, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#00ffff'; ctx.fill(); ctx.shadowBlur = 0;
                ctx.fillStyle = '#ff0000'; ctx.font = 'bold 64px monospace';
                ctx.shadowColor = 'rgba(255, 0, 0, 0.5)'; ctx.shadowBlur = 15;
                ctx.fillText('СТАРТ', btnX, btnY + 6); ctx.shadowBlur = 0;
                return;
            }
            const grad = ctx.createLinearGradient(0, 0, 0, H);
            grad.addColorStop(0, '#0b0b2a'); grad.addColorStop(0.5, '#162044'); grad.addColorStop(1, '#1a2a3a');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            for (let i = 0; i < 40; i++) {
                const sx = (i * 137 + i * i * 7) % W;
                const sy = (i * 89 + i * i * 13) % (H * 0.6);
                ctx.beginPath(); ctx.arc(sx, sy, 0.5 + (i % 3) * 0.5, 0, Math.PI * 2); ctx.fill();
            }
            for (const p of platforms) {
                if (p.type === 'ground') {
                    const grd = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
                    grd.addColorStop(0, '#4a6a4a'); grd.addColorStop(0.3, '#3a5a3a'); grd.addColorStop(1, '#2a3a2a');
                    ctx.fillStyle = grd; ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.fillStyle = '#5a8a4a'; ctx.fillRect(p.x, p.y, p.w, 4);
                } else {
                    const grd = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
                    grd.addColorStop(0, '#8a7a6a'); grd.addColorStop(0.5, '#6a5a4a'); grd.addColorStop(1, '#4a3a2a');
                    ctx.fillStyle = grd; ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 8;
                    ctx.fillRect(p.x, p.y, p.w, p.h); ctx.shadowBlur = 0;
                }
            }
            for (const t of trampolines) {
                ctx.fillStyle = '#666';
                for (let i = 0; i < 3; i++) ctx.fillRect(t.x + 6 + i * 12, t.y + 4, 3, 8);
                const bounce = t.cooldown > 0 ? 4 : 0;
                const grd = ctx.createLinearGradient(0, t.y - bounce, 0, t.y + t.h - bounce);
                grd.addColorStop(0, '#ff6b6b'); grd.addColorStop(0.4, '#ee5a24'); grd.addColorStop(1, '#aa3a1a');
                ctx.fillStyle = grd; ctx.shadowColor = 'rgba(255,100,50,0.4)'; ctx.shadowBlur = 16;
                ctx.fillRect(t.x, t.y - bounce, t.w, t.h + bounce); ctx.shadowBlur = 0;
            }
            for (const coin of coins) {
                if (coin.collected) continue;
                const pulse = 1 + Math.sin(frame * 0.06 + coin.x) * 0.08;
                const r = coin.r * pulse;
                ctx.shadowColor = 'rgba(255,215,0,0.5)'; ctx.shadowBlur = 16;
                const grd = ctx.createRadialGradient(coin.x - 3, coin.y - 3, 2, coin.x, coin.y, r);
                grd.addColorStop(0, '#ffd700'); grd.addColorStop(0.7, '#ffb300'); grd.addColorStop(1, '#cc8800');
                ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(coin.x, coin.y, r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            }
            
            if (keyItem && !keyItem.collected) {
                ctx.shadowColor = 'rgba(255,215,0,0.8)'; ctx.shadowBlur = 20;
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(keyItem.x + 8, keyItem.y, 4, 20);
                ctx.beginPath();
                ctx.arc(keyItem.x + 10, keyItem.y + 22, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ff6b00';
                ctx.beginPath();
                ctx.arc(keyItem.x + 10, keyItem.y + 22, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            if (cage) {
                ctx.strokeStyle = cage.open ? '#4f4' : '#ff6b6b';
                ctx.lineWidth = 3;
                ctx.shadowColor = cage.open ? 'rgba(0,255,0,0.3)' : 'rgba(255,0,0,0.3)';
                ctx.shadowBlur = 15;
                ctx.strokeRect(cage.x, cage.y, cage.w, cage.h);
                for (let i = 0; i < cage.w; i += 15) {
                    ctx.beginPath();
                    ctx.moveTo(cage.x + i, cage.y);
                    ctx.lineTo(cage.x + i, cage.y + cage.h);
                    ctx.stroke();
                }
                for (let i = 0; i < cage.h; i += 15) {
                    ctx.beginPath();
                    ctx.moveTo(cage.x, cage.y + i);
                    ctx.lineTo(cage.x + cage.w, cage.y + i);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;
                
                if (!cage.open) {
                    ctx.font = '50px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#ff0000';
                    ctx.fillText('🍄', cage.x + cage.w/2, cage.y + cage.h/2 + 5);
                    ctx.font = '20px sans-serif';
                    ctx.fillStyle = '#ff6b6b';
                    ctx.fillText('🔒', cage.x + cage.w/2, cage.y - 15);
                } else {
                    ctx.font = '60px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#ff0000';
                    ctx.fillText('⭐', cage.x + cage.w/2, cage.y + cage.h/2 + 5);
                    ctx.font = '16px sans-serif';
                    ctx.fillStyle = '#4f4';
                    ctx.fillText('✅ СВОБОДЕН!', cage.x + cage.w/2, cage.y - 15);
                    
                    const marioX = cage.x + cage.w/2 + Math.sin(frame * 0.03) * 60;
                    const marioY = cage.y + cage.h/2 + Math.cos(frame * 0.02) * 30;
                    ctx.font = '40px sans-serif';
                    ctx.fillStyle = '#ff0000';
                    ctx.fillText('🍄', marioX, marioY);
                }
            }
            
            if (goal) {
                if (goal.active) {
                    const pulse = 1 + Math.sin(frame * 0.04) * 0.05;
                    const gw = goal.w * pulse, gh = goal.h * pulse;
                    const gx = goal.x + (goal.w - gw) / 2, gy = goal.y + (goal.h - gh) / 2;
                    ctx.fillStyle = '#2a2a4a'; ctx.fillRect(goal.x + 16, goal.y - 12, 4, 52);
                    const flagGrad = ctx.createLinearGradient(gx, gy, gx + gw, gy);
                    flagGrad.addColorStop(0, '#ff6b6b'); flagGrad.addColorStop(0.5, '#ffd93d'); flagGrad.addColorStop(1, '#6bcb77');
                    ctx.fillStyle = flagGrad; ctx.shadowColor = 'rgba(255,200,100,0.3)'; ctx.shadowBlur = 20;
                    ctx.beginPath(); ctx.moveTo(gx + 4, gy + 4); ctx.lineTo(gx + gw - 4, gy + gh / 2); ctx.lineTo(gx + 4, gy + gh - 4); ctx.closePath(); ctx.fill();
                    ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font = '18px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('★', gx + gw / 2, gy + gh / 2 + 1);
                    
                    if (cage && cage.open) {
                        ctx.fillStyle = '#ffd700';
                        ctx.font = '14px monospace';
                        ctx.fillText('🎉 СПАСИ МАРИО! +1000', gx + gw / 2, gy - 25);
                    }
                } else {
                    ctx.globalAlpha = 0.4;
                    ctx.fillStyle = '#2a2a4a'; ctx.fillRect(goal.x + 16, goal.y - 12, 4, 52);
                    ctx.fillStyle = '#666'; ctx.shadowColor = 'rgba(100,100,100,0.3)'; ctx.shadowBlur = 10;
                    ctx.beginPath(); ctx.moveTo(goal.x + 4, goal.y + 4); ctx.lineTo(goal.x + goal.w - 4, goal.y + goal.h / 2); ctx.lineTo(goal.x + 4, goal.y + goal.h - 4); ctx.closePath(); ctx.fill();
                    ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '14px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    let collectedCount = 0;
                    for (const coin of coins) {
                        if (coin.collected) collectedCount++;
                    }
                    let statusText = `${collectedCount}/${requiredCoinsForGoal}`;
                    if (cage) {
                        statusText += cage.open ? ' ✅' : ' 🔑';
                    }
                    ctx.fillText(statusText, goal.x + goal.w / 2, goal.y + goal.h / 2 + 1);
                    ctx.globalAlpha = 1;
                }
            }
            drawPlayer();
            for (const p of particles) {
                const alpha = p.life / p.maxLife;
                ctx.globalAlpha = alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
            }
            if (gameState === 'gameover') {
                ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ff6b6b'; ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(255,0,0,0.3)'; ctx.shadowBlur = 30; ctx.fillText('💔 GAME OVER', W / 2, H / 2 - 20);
                ctx.shadowBlur = 0; ctx.fillStyle = '#ccd'; ctx.font = '20px monospace'; ctx.fillText('Нажмите ↺', W / 2, H / 2 + 50);
            }
            if (gameState === 'win') {
                ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#ffd700'; ctx.font = 'bold 48px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(255,215,0,0.5)'; ctx.shadowBlur = 40;
                ctx.fillText('🏆 ВСЕ УРОВНИ ПРОЙДЕНЫ!', W / 2, H / 2 - 20);
                ctx.shadowBlur = 0; ctx.fillStyle = '#ccd'; ctx.font = '20px monospace'; 
                ctx.fillText(`Счёт: ${score}  •  Нажмите ↺`, W / 2, H / 2 + 60);
            }
        }

        function drawPlayer() {
            const p = player; const px = p.x; const py = p.y;
            if (p.invincible > 0 && Math.floor(p.invincible / 4) % 2 === 0) ctx.globalAlpha = 0.5;
            ctx.save(); ctx.translate(px + p.w / 2, py + p.h);
            if (p.facing < 0) ctx.scale(-1, 1);
            const s = 1; ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 12; ctx.shadowOffsetY = 4;
            const bodyGrad = ctx.createLinearGradient(0, -32 * s, 0, -6 * s);
            bodyGrad.addColorStop(0, '#f5e6d0'); bodyGrad.addColorStop(0.2, '#f0dcc4'); bodyGrad.addColorStop(1, '#e8c8a8');
            ctx.fillStyle = bodyGrad; ctx.shadowBlur = 8; ctx.shadowOffsetY = 2;
            ctx.beginPath(); ctx.roundRect(-10 * s, -28 * s, 20 * s, 22 * s, 4 * s); ctx.fill();
            ctx.shadowBlur = 4; ctx.shadowOffsetY = 1;
            const dressGrad = ctx.createLinearGradient(0, -14 * s, 0, -4 * s);
            dressGrad.addColorStop(0, '#d4e8f0'); dressGrad.addColorStop(0.5, '#c0d8e8'); dressGrad.addColorStop(1, '#a8c8d8');
            ctx.fillStyle = dressGrad;
            ctx.beginPath(); ctx.moveTo(-12 * s, -12 * s); ctx.quadraticCurveTo(-16 * s, -6 * s, -12 * s, -2 * s);
            ctx.lineTo(12 * s, -2 * s); ctx.quadraticCurveTo(16 * s, -6 * s, 12 * s, -12 * s); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#c8a060'; ctx.fillRect(-10 * s, -14 * s, 20 * s, 3 * s);
            ctx.shadowBlur = 6; ctx.shadowOffsetY = 2;
            const headGrad = ctx.createRadialGradient(-2 * s, -36 * s, 2 * s, 0, -32 * s, 12 * s);
            headGrad.addColorStop(0, '#f5e6d0'); headGrad.addColorStop(0.7, '#f0dcc4'); headGrad.addColorStop(1, '#e0c8b0');
            ctx.fillStyle = headGrad; ctx.beginPath(); ctx.arc(0, -32 * s, 11 * s, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 2; ctx.shadowOffsetY = 0; ctx.fillStyle = '#f5d080';
            ctx.beginPath(); ctx.ellipse(0, -36 * s, 13 * s, 10 * s, 0, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = '#edc060';
            ctx.beginPath(); ctx.moveTo(-12 * s, -36 * s); ctx.quadraticCurveTo(-8 * s, -44 * s, -2 * s, -40 * s);
            ctx.quadraticCurveTo(2 * s, -44 * s, 8 * s, -40 * s); ctx.quadraticCurveTo(12 * s, -36 * s, 10 * s, -32 * s);
            ctx.quadraticCurveTo(6 * s, -34 * s, 0, -32 * s); ctx.quadraticCurveTo(-6 * s, -34 * s, -12 * s, -36 * s); ctx.closePath(); ctx.fill();
            ctx.fillStyle = '#e8b850'; ctx.fillRect(-14 * s, -34 * s, 3 * s, 10 * s); ctx.fillRect(11 * s, -34 * s, 3 * s, 10 * s);
            ctx.beginPath(); ctx.moveTo(8 * s, -32 * s); ctx.quadraticCurveTo(14 * s, -30 * s, 12 * s, -24 * s);
            ctx.quadraticCurveTo(10 * s, -20 * s, 6 * s, -22 * s); ctx.quadraticCurveTo(8 * s, -26 * s, 6 * s, -30 * s); ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0; ctx.fillStyle = '#ffffff'; ctx.fillRect(-7 * s, -35 * s, 5 * s, 5 * s); ctx.fillRect(2 * s, -35 * s, 5 * s, 5 * s);
            const eyeGrad = ctx.createRadialGradient(-5 * s, -33 * s, 1 * s, -5 * s, -33 * s, 3 * s);
            eyeGrad.addColorStop(0, '#ffd700'); eyeGrad.addColorStop(0.6, '#d4a800'); eyeGrad.addColorStop(1, '#8a6a00');
            ctx.fillStyle = eyeGrad; ctx.beginPath(); ctx.arc(-5 * s, -33 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(4 * s, -33 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(-4 * s, -34 * s, 1 * s, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(5 * s, -34 * s, 1 * s, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#c08070'; ctx.lineWidth = 1.5 * s; ctx.beginPath(); ctx.arc(0, -29 * s, 3 * s, 0.1, Math.PI - 0.1); ctx.stroke();
            ctx.fillStyle = '#ff6b9d'; ctx.shadowBlur = 4; ctx.shadowColor = 'rgba(255,100,150,0.3)';
            for (let i = 0; i < 5; i++) { const angle = i / 5 * Math.PI * 2 + frame * 0.02; const fx = 10 * s + Math.cos(angle) * 4 * s; const fy = -38 * s + Math.sin(angle) * 4 * s; ctx.beginPath(); ctx.arc(fx, fy, 2.5 * s, 0, Math.PI * 2); ctx.fill(); }
            ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(10 * s, -38 * s, 2 * s, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 2; ctx.shadowOffsetY = 1; ctx.fillStyle = '#f0dcc4'; ctx.fillRect(-13 * s, -26 * s, 4 * s, 10 * s); ctx.fillRect(9 * s, -26 * s, 4 * s, 10 * s);
            ctx.fillStyle = '#d4b8a0'; ctx.shadowBlur = 2; ctx.shadowOffsetY = 1; ctx.fillRect(-8 * s, -4 * s, 6 * s, 6 * s); ctx.fillRect(2 * s, -4 * s, 6 * s, 6 * s);
            ctx.fillStyle = '#8a6a4a'; ctx.fillRect(-8 * s, -2 * s, 6 * s, 2 * s); ctx.fillRect(2 * s, -2 * s, 6 * s, 2 * s);
            ctx.restore(); ctx.globalAlpha = 1; ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2; if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y); this.lineTo(x + w - r, y); this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r); this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h); this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r); this.quadraticCurveTo(x, y, x + r, y); return this;
            };
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (gameState === 'menu') {
                if (key === ' ' || key === 'Space' || key === 'Enter') { e.preventDefault(); startGame(); }
                return;
            }
            if (key === 'ArrowLeft' || key === 'Left') { e.preventDefault(); keys['ArrowLeft'] = true; }
            if (key === 'ArrowRight' || key === 'Right') { e.preventDefault(); keys['ArrowRight'] = true; }
            if (key === ' ' || key === 'Space') { e.preventDefault(); keys['Space'] = true; jumpKeyDown = true; jumpKeyProcessed = false; }
            if (key === 'a' || key === 'A') keys['KeyA'] = true;
            if (key === 'd' || key === 'D') keys['KeyD'] = true;
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key;
            if (gameState === 'menu') return;
            if (key === 'ArrowLeft' || key === 'Left') { e.preventDefault(); keys['ArrowLeft'] = false; }
            if (key === 'ArrowRight' || key === 'Right') { e.preventDefault(); keys['ArrowRight'] = false; }
            if (key === ' ' || key === 'Space') { e.preventDefault(); keys['Space'] = false; jumpKeyDown = false; jumpKeyProcessed = false; }
            if (key === 'a' || key === 'A') keys['KeyA'] = false;
            if (key === 'd' || key === 'D') keys['KeyD'] = false;
        });

        document.querySelectorAll('[data-key]').forEach(btn => {
            const key = btn.dataset.key;
            const press = (e) => { 
                e.preventDefault(); 
                if (gameState === 'menu') { startGame(); return; }
                keys[key] = true; 
                if (key === 'Space') { jumpKeyDown = true; jumpKeyProcessed = false; } 
            };
            const release = (e) => { 
                e.preventDefault(); 
                if (gameState === 'menu') return;
                keys[key] = false; 
                if (key === 'Space') { jumpKeyDown = false; jumpKeyProcessed = false; } 
            };
            btn.addEventListener('mousedown', press);
            btn.addEventListener('touchstart', press, { passive: false });
            btn.addEventListener('mouseup', release);
            btn.addEventListener('touchend', release, { passive: false });
            btn.addEventListener('mouseleave', release);
            btn.addEventListener('touchcancel', release, { passive: false });
        });

        restartBtn.addEventListener('click', () => { 
            if (gameState === 'menu') return;
            restartGame(); 
        });
        restartBtn.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if (gameState === 'menu') return;
            restartGame(); 
        }, { passive: false });

        canvas.addEventListener('click', (e) => { 
            if (gameState === 'menu') { 
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                if (x > W/2 - 130 && x < W/2 + 130 && y > 225 && y < 335) startGame();
            }
        });

        canvas.addEventListener('touchstart', (e) => { 
            if (gameState === 'menu') {
                e.preventDefault(); 
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (touch.clientX - rect.left) * scaleX;
                const y = (touch.clientY - rect.top) * scaleY;
                if (x > W/2 - 130 && x < W/2 + 130 && y > 225 && y < 335) startGame();
            }
        }, { passive: false });

        gameLoop();

        function resizeCanvas() {
            const wrap = canvas.parentElement; 
            const rect = wrap.getBoundingClientRect();
            const ratio = 800 / 520; 
            let w = rect.width; 
            let h = w / ratio;
            if (h > rect.height) { h = rect.height; w = h * ratio; }
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => { setTimeout(resizeCanvas, 200); });
        setTimeout(resizeCanvas, 50);
    })();
</script>
